<!DOCTYPE html>
<html lang="th" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการทรัพย์สิน | ITSM Admin</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.454.0/lucide.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', 'Sarabun', sans-serif; }
    </style>
</head>
<body class="h-full flex overflow-hidden">
    <!-- Mobile Sidebar Overlay -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-slate-900/50 z-40 hidden transition-opacity lg:hidden"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-slate-900 text-white flex flex-col h-full shadow-2xl transition-transform duration-300 z-50 -translate-x-full lg:translate-x-0 lg:static">
        <div class="h-20 flex items-center justify-between px-6 border-b border-slate-800">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-blue-400 rounded-xl flex items-center justify-center text-white font-bold text-lg shadow-lg shadow-indigo-500/30">IT</div>
                <div>
                    <span class="font-bold text-base tracking-tight block leading-tight">ITSM</span>
                    <span class="text-[10px] text-slate-400 block leading-tight font-medium">Enterprise Admin</span>
                </div>
            </div>
            <button id="closeSidebar" class="lg:hidden text-slate-400 hover:text-white p-1"><i data-lucide="x" class="h-6 w-6"></i></button>
        </div>
        <nav class="flex-1 py-6 overflow-y-auto">
            <div class="px-6 mb-4">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.1em]">หลัก (Main)</p>
            </div>
            <div class="space-y-1 px-3">
                <a href="/" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all">
                    <i data-lucide="layout-dashboard" class="mr-3 h-5 w-5"></i> หน้าแรก
                </a>
                <a href="/users.html" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all">
                    <i data-lucide="users" class="mr-3 h-5 w-5"></i> จัดการผู้ใช้งาน
                </a>
                <a href="/assets.html" class="flex items-center px-4 py-3 text-sm font-semibold rounded-xl bg-indigo-600 text-white shadow-lg shadow-indigo-600/20 transition-all">
                    <i data-lucide="monitor" class="mr-3 h-5 w-5"></i> จัดการทรัพย์สิน
                </a>
                <a href="/tickets.html" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all">
                    <i data-lucide="ticket" class="mr-3 h-5 w-5"></i> ระบบแจ้งซ่อม
                </a>
                <a href="/settings.html" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all">
                    <i data-lucide="settings" class="mr-3 h-5 w-5"></i> ตั้งค่าระบบ
                </a>
            </div>
        </nav>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-4 sm:px-10 shadow-sm z-10">
            <div class="flex items-center gap-4">
                <button id="openSidebar" class="lg:hidden text-slate-500 hover:text-indigo-600 p-2 rounded-xl hover:bg-slate-50 transition-all"><i data-lucide="menu" class="h-6 w-6"></i></button>
                <h1 class="text-lg sm:text-xl font-bold text-slate-800 tracking-tight">จัดการทรัพย์สินไอที</h1>
            </div>
            <div class="flex items-center gap-2 sm:gap-6">
                <div class="flex items-center gap-2 sm:gap-4">
                    <div class="text-right hidden md:block">
                        <p id="userName" class="text-sm font-bold text-slate-800 leading-tight">Loading...</p>
                        <p id="userRole" class="text-[10px] text-slate-500 font-bold uppercase tracking-wider leading-tight">System Admin</p>
                        <p id="currentTime" class="text-[10px] font-semibold text-slate-500 mt-0.5">30/03/2026</p>
                    </div>
                    <button onclick="window.location.href='/profile.html'" class="flex items-center gap-3 p-1 rounded-2xl hover:bg-slate-50 transition-all">
                        <div id="userAvatar" class="w-9 h-9 sm:w-10 sm:h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-blue-500 flex items-center justify-center text-white font-bold text-xs sm:text-sm shadow-lg shadow-indigo-500/20 overflow-hidden">U</div>
                    </button>
                    <button id="logoutBtn" class="w-9 h-9 sm:w-10 sm:h-10 flex items-center justify-center rounded-xl text-slate-400 hover:text-red-500 hover:bg-red-50 transition-all group">
                        <i data-lucide="log-out" class="h-5 w-5 group-hover:translate-x-0.5 transition-transform"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-x-hidden overflow-y-auto p-4 sm:p-10 bg-slate-50/50">
            <div class="max-w-6xl mx-auto space-y-6 sm:space-y-10">
                <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
                    <div class="relative w-full md:w-96">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                            <i data-lucide="search" class="w-5 h-5"></i>
                        </div>
                        <input type="text" id="assetSearch" placeholder="ค้นหาทรัพย์สิน, S/N, Tag..." 
                            class="block w-full pl-12 pr-4 py-3 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-600 outline-none transition-all shadow-sm bg-white">
                    </div>
                    <button onclick="openAssetModal()" class="w-full md:w-auto bg-indigo-600 text-white px-6 py-3 rounded-2xl text-sm font-bold shadow-lg shadow-indigo-600/20 hover:bg-indigo-500 transition-all flex items-center justify-center gap-2 active:scale-95">
                        <i data-lucide="plus-circle" class="w-5 h-5"></i> เพิ่มทรัพย์สินใหม่
                    </button>
                </div>

                <div class="bg-white rounded-2xl sm:rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[800px]">
                            <thead>
                                <tr class="bg-slate-50 border-b border-slate-200">
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Asset Tag / SN</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">รายการทรัพย์สิน</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">หมวดหมู่</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">ผู้ครอบครอง</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">สถานะ</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="assetTableBody" class="divide-y divide-slate-100">
                                <tr><td colspan="6" class="px-6 py-10 text-center text-slate-400">กำลังโหลดข้อมูลทรัพย์สิน...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Asset Modal -->
    <div id="assetModal" class="fixed inset-0 bg-slate-900/50 z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl overflow-hidden">
            <div class="px-8 py-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                <h2 id="modalTitle" class="text-xl font-bold text-slate-800 tracking-tight">เพิ่มทรัพย์สินใหม่</h2>
                <button onclick="closeAssetModal()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <form id="assetForm" class="p-8 space-y-5">
                <input type="hidden" id="assetId">
                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Asset Tag</label>
                        <input type="text" id="assetTag" required class="block w-full px-4 py-3 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-600 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Serial Number</label>
                        <input type="text" id="serialNumber" required class="block w-full px-4 py-3 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-600 outline-none transition-all">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">ชื่อทรัพย์สิน</label>
                        <input type="text" id="assetName" required class="block w-full px-4 py-3 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-600 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">รุ่น (Model)</label>
                        <input type="text" id="assetModel" class="block w-full px-4 py-3 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-600 outline-none transition-all">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">หมวดหมู่</label>
                        <select id="assetCategory" required class="block w-full px-4 py-3 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-600 outline-none transition-all bg-white">
                            <option value="Laptop">Laptop</option>
                            <option value="Desktop">Desktop</option>
                            <option value="Monitor">Monitor</option>
                            <option value="Printer">Printer</option>
                            <option value="Mobile">Mobile Phone</option>
                            <option value="Network">Network Device</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">วันที่ซื้อ (Purchase Date)</label>
                        <input type="date" id="assetPurchaseDate" class="block w-full px-4 py-3 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-600 outline-none transition-all bg-white">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">สถานะ</label>
                        <select id="assetStatus" required class="block w-full px-4 py-3 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-600 outline-none transition-all bg-white">
                            <option value="In Use">กำลังใช้งาน (In Use)</option>
                            <option value="Available">พร้อมใช้งาน (Available)</option>
                            <option value="Repairing">ส่งซ่อม (Repairing)</option>
                            <option value="Broken">ชำรุด (Broken)</option>
                            <option value="Retired">เลิกใช้งาน (Retired)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">ผู้ครอบครอง</label>
                        <select id="assetUser" class="block w-full px-4 py-3 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-600 outline-none transition-all bg-white">
                            <option value="">ไม่มี (Stock)</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">แผนก</label>
                        <select id="assetDept" class="block w-full px-4 py-3 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-600 outline-none transition-all bg-white">
                            <option value="">ไม่มีแผนก</option>
                        </select>
                    </div>
                    <div class="flex items-end">
                        <button type="button" id="deleteAssetBtn" onclick="confirmDeleteAsset()" class="hidden w-full px-6 py-3 rounded-2xl font-bold text-red-600 bg-red-50 hover:bg-red-100 transition-all flex items-center justify-center gap-2">
                            <i data-lucide="trash-2" class="w-5 h-5"></i> ลบทรัพย์สินนี้
                        </button>
                    </div>
                </div>
                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="closeAssetModal()" class="flex-1 px-6 py-3 rounded-2xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-all">ยกเลิก</button>
                    <button type="submit" class="flex-1 bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg shadow-indigo-600/20 hover:bg-indigo-500 transition-all flex items-center justify-center gap-2">
                        <i data-lucide="save" class="w-5 h-5"></i> บันทึกข้อมูล
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/assets/js/app.js"></script>
    <script>
        // Sidebar logic
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        function toggleSidebar() {
            sidebar.classList.toggle('-translate-x-full');
            sidebarOverlay.classList.toggle('hidden');
        }
        document.getElementById('openSidebar')?.addEventListener('click', toggleSidebar);
        document.getElementById('closeSidebar')?.addEventListener('click', toggleSidebar);
        sidebarOverlay?.addEventListener('click', toggleSidebar);

        // Assets Logic
        let allAssets = [];
        let allUsers = [];
        let allDepts = [];

        async function loadInitialData() {
            try {
                // Load Users and Depts for selects
                const [userRes, deptRes] = await Promise.all([
                    apiFetch('/api/users'),
                    apiFetch('/api/departments')
                ]);
                
                allUsers = await userRes.json();
                allDepts = await deptRes.json();

                const userSelect = document.getElementById('assetUser');
                const deptSelect = document.getElementById('assetDept');

                userSelect.innerHTML = '<option value="">ไม่มี (Stock)</option>' + 
                    allUsers.map(u => `<option value="${u.id}">${escapeHTML(u.name)}</option>`).join('');
                
                deptSelect.innerHTML = '<option value="">ไม่มีแผนก</option>' + 
                    allDepts.map(d => `<option value="${d.id}">${escapeHTML(d.name)}</option>`).join('');

                await loadAssets();
            } catch (err) {
                console.error('Failed to load initial data:', err);
            }
        }

        async function loadAssets() {
            const tbody = document.getElementById('assetTableBody');
            try {
                const response = await apiFetch('/api/assets');
                allAssets = await response.json();
                renderAssets(allAssets);
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-10 text-center text-red-500">เกิดข้อผิดพลาดในการโหลดข้อมูล</td></tr>';
            }
        }

        function renderAssets(assets) {
            const tbody = document.getElementById('assetTableBody');
            if (assets.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-10 text-center text-slate-400">ไม่พบข้อมูลทรัพย์สิน</td></tr>';
                return;
            }

            tbody.innerHTML = assets.map(a => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-6 py-4">
                        <div class="font-bold text-slate-800">${escapeHTML(a.asset_tag)}</div>
                        <div class="text-[10px] text-slate-400 font-medium">S/N: ${escapeHTML(a.serial_number)}</div>
                    </td>
                    <td class="px-6 py-4">
                        <div class="text-sm font-semibold text-slate-700">${escapeHTML(a.name)}</div>
                        <div class="text-[10px] text-slate-400">${escapeHTML(a.model || '')}</div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-3 py-1 bg-slate-100 text-slate-600 rounded-full text-[10px] font-bold uppercase tracking-wider">${escapeHTML(a.category)}</span>
                    </td>
                    <td class="px-6 py-4">
                        <div class="text-sm font-medium text-slate-600">${escapeHTML(a.assigned_to_name || 'Stock')}</div>
                        <div class="text-[10px] text-slate-400">${escapeHTML(a.department_name || '-')}</div>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider ${getStatusClass(a.status)}">
                            ${a.status}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="editAsset('${a.id}')" class="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition-all">
                            <i data-lucide="edit-3" class="w-4 h-4"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function getStatusClass(status) {
            switch(status) {
                case 'In Use': return 'bg-blue-50 text-blue-600';
                case 'Available': return 'bg-emerald-50 text-emerald-600';
                case 'Repairing': return 'bg-amber-50 text-amber-600';
                case 'Broken': return 'bg-red-50 text-red-600';
                default: return 'bg-slate-50 text-slate-600';
            }
        }

        // Modal Controls
        function openAssetModal() {
            document.getElementById('modalTitle').innerText = 'เพิ่มทรัพย์สินใหม่';
            document.getElementById('assetForm').reset();
            document.getElementById('assetId').value = '';
            document.getElementById('deleteAssetBtn').classList.add('hidden');
            document.getElementById('assetModal').classList.remove('hidden');
        }

        function closeAssetModal() {
            document.getElementById('assetModal').classList.add('hidden');
        }

        async function editAsset(id) {
            const asset = allAssets.find(a => a.id === id);
            if (!asset) return;

            document.getElementById('modalTitle').innerText = 'แก้ไขข้อมูลทรัพย์สิน';
            document.getElementById('assetId').value = asset.id;
            document.getElementById('assetTag').value = asset.asset_tag;
            document.getElementById('serialNumber').value = asset.serial_number;
            document.getElementById('assetName').value = asset.name;
            document.getElementById('assetModel').value = asset.model || '';
            document.getElementById('assetCategory').value = asset.category;
            document.getElementById('assetStatus').value = asset.status;
            document.getElementById('assetUser').value = asset.assigned_to || '';
            document.getElementById('assetDept').value = asset.department_id || '';
            
            if (asset.purchase_date) {
                document.getElementById('assetPurchaseDate').value = asset.purchase_date.split('T')[0];
            } else {
                document.getElementById('assetPurchaseDate').value = '';
            }

            document.getElementById('deleteAssetBtn').classList.remove('hidden');
            document.getElementById('assetModal').classList.remove('hidden');
        }

        async function confirmDeleteAsset() {
            const id = document.getElementById('assetId').value;
            if (!id) return;

            const confirmed = await notify.confirm('ยืนยันการลบ', 'คุณแน่ใจหรือไม่ว่าต้องการลบทรัพย์สินนี้? ข้อมูลจะไม่สามารถกู้คืนได้');
            if (confirmed) {
                try {
                    const response = await apiFetch(`/api/assets?action=delete&id=${id}`, {
                        method: 'POST'
                    });

                    if (response.ok) {
                        notify.success('ลบทรัพย์สินเรียบร้อยแล้ว');
                        closeAssetModal();
                        loadAssets();
                    } else {
                        const err = await response.json();
                        notify.error(err.message || 'เกิดข้อผิดพลาดในการลบ');
                    }
                } catch (err) {
                    notify.error('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้');
                }
            }
        }

        document.getElementById('assetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('assetId').value;
            const data = {
                id: id || null,
                asset_tag: document.getElementById('assetTag').value,
                serial_number: document.getElementById('serialNumber').value,
                name: document.getElementById('assetName').value,
                model: document.getElementById('assetModel').value,
                category: document.getElementById('assetCategory').value,
                status: document.getElementById('assetStatus').value,
                assigned_to: document.getElementById('assetUser').value || null,
                department_id: document.getElementById('assetDept').value || null,
                purchase_date: document.getElementById('assetPurchaseDate').value || null
            };

            try {
                const response = await apiFetch('/api/assets', {
                    method: 'POST',
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    notify.success(id ? 'แก้ไขข้อมูลสำเร็จ' : 'เพิ่มทรัพย์สินสำเร็จ');
                    closeAssetModal();
                    loadAssets();
                } else {
                    const err = await response.json();
                    notify.error(err.message || 'เกิดข้อผิดพลาด');
                }
            } catch (err) {
                notify.error('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้');
            }
        });

        // Search logic
        document.getElementById('assetSearch').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allAssets.filter(a => 
                a.asset_tag.toLowerCase().includes(term) || 
                a.serial_number.toLowerCase().includes(term) || 
                a.name.toLowerCase().includes(term) ||
                (a.assigned_to_name || '').toLowerCase().includes(term)
            );
            renderAssets(filtered);
        });

        document.addEventListener('DOMContentLoaded', loadInitialData);
    </script>
</body>
</html>

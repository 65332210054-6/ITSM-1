<!DOCTYPE html>
<html lang="th" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการทรัพย์สิน | ITSM Admin</title>
    <script>
        if (!localStorage.getItem('token')) {
            window.location.replace('/login.html');
        }
    </script>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.454.0/lucide.min.css" rel="stylesheet">
    <!-- Choices.js CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body class="h-full flex overflow-hidden">
    <!-- Mobile Sidebar Overlay -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-slate-900/50 z-40 hidden transition-opacity lg:hidden"></div>

    <!-- Sidebar Container (Client-side rendered) -->
    <div id="sidebar-container" class="lg:static"></div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <!-- Header Container (Client-side rendered) -->
        <div id="header-container"></div>

        <main class="flex-1 overflow-x-hidden overflow-y-auto p-4 sm:p-10 bg-slate-50/50">
            <div class="max-w-6xl mx-auto space-y-6 sm:space-y-10">
                <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
                    <div class="relative w-full md:w-96 flex gap-2">
                        <div class="relative flex-1">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                                <i data-lucide="search" class="w-5 h-5"></i>
                            </div>
                            <input type="text" id="assetSearch" placeholder="ค้นหาทรัพย์สิน, S/N, Tag..." 
                                class="block w-full pl-12 pr-4 py-3 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-600 outline-none transition-all shadow-sm bg-white">
                        </div>
                        <button id="exportAssetsBtn" class="p-3 bg-white border border-slate-200 rounded-2xl text-slate-600 hover:text-indigo-600 hover:border-indigo-200 transition-all shadow-sm group" title="ส่งออก CSV">
                            <i data-lucide="download" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
                        </button>
                    </div>
                    <button onclick="openAssetModal()" class="w-full md:w-auto btn-primary">
                        <i data-lucide="plus-circle" class="w-5 h-5"></i> เพิ่มทรัพย์สินใหม่
                    </button>
                </div>

                <div class="card">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[800px]">
                            <thead>
                                <tr class="bg-slate-50 border-b border-slate-200">
                                    <th class="th-cell">Asset Tag / SN</th>
                                    <th class="th-cell">รายการทรัพย์สิน</th>
                                    <th class="th-cell">หมวดหมู่</th>
                                    <th class="th-cell">ผู้ครอบครอง</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-center">สถานะ</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">แก้ไข</th>
                                </tr>
                            </thead>
                            <tbody id="assetTableBody" class="divide-y divide-slate-100">
                                <script>document.write(`<tr><td colspan="6" class="px-6 py-10"></td></tr>`);</script>
                            </tbody>
                        </table>
                    </div>
                    <!-- Pagination Footer -->
                    <div class="pagination-footer">
                        <div class="flex items-center gap-4">
                            <div class="text-xs font-bold text-slate-500 uppercase tracking-wider">
                                แสดง <span id="showingStart">0</span> - <span id="showingEnd">0</span> จาก <span id="totalItems">0</span> รายการ
                            </div>
                            <div class="flex items-center gap-2 border-l border-slate-200 pl-4">
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">แสดงหน้าละ:</span>
                                <select id="itemsPerPageSelect">
                                    <option value="10">10</option>
                                    <option value="20">20</option>
                                    <option value="30">30</option>
                                    <option value="50">50</option>
                                </select>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <button id="prevPage" class="pagination-btn-nav" disabled>
                                <i data-lucide="chevron-left" class="w-5 h-5"></i>
                            </button>
                            <div id="pageNumbers" class="flex items-center gap-1">
                                <!-- Page numbers will be injected here -->
                            </div>
                            <button id="nextPage" class="pagination-btn-nav" disabled>
                                <i data-lucide="chevron-right" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Asset Modal -->
    <div id="assetModal" class="modal-overlay hidden">
        <div class="modal-content animate-in fade-in zoom-in duration-200">
            <div class="px-8 py-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/50 rounded-t-3xl">
                <h2 id="modalTitle" class="text-xl font-bold text-slate-800 tracking-tight">เพิ่มทรัพย์สินใหม่</h2>
                <button onclick="closeAssetModal()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <form id="assetForm" class="p-8 space-y-5">
                <input type="hidden" id="assetId">
                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="form-label">Asset Tag</label>
                        <input type="text" id="assetTag" required class="form-input">
                    </div>
                    <div>
                        <label class="form-label">Serial Number</label>
                        <input type="text" id="serialNumber" required class="form-input">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="form-label">ชื่อทรัพย์สิน</label>
                        <input type="text" id="assetName" required class="form-input">
                    </div>
                    <div>
                        <label class="form-label">รุ่น (Model)</label>
                        <input type="text" id="assetModel" class="form-input">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="form-label">หมวดหมู่</label>
                        <select id="assetCategory" required class="form-input" data-search="true">
                            <option value="">-- กำลังโหลด --</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">วันที่ซื้อ (Purchase Date)</label>
                        <input type="date" id="assetPurchaseDate" class="form-input">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="form-label">สถานะ</label>
                        <select id="assetStatus" required class="form-input">
                            <option value="In Use">กำลังใช้งาน (In Use)</option>
                            <option value="Available">พร้อมใช้งาน (Available)</option>
                            <option value="Repairing">ส่งซ่อม (Repairing)</option>
                            <option value="Broken">ชำรุด (Broken)</option>
                            <option value="Retired">เลิกใช้งาน (Retired)</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">ผู้ครอบครอง</label>
                        <select id="assetUser" class="form-input" data-search="true">
                            <option value="">ไม่มี (Stock)</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="form-label">แผนก</label>
                        <select id="assetDept" class="form-input">
                            <option value="">ไม่มีแผนก</option>
                        </select>
                    </div>
                    <div class="flex items-end">
                        <button type="button" id="deleteAssetBtn" onclick="confirmDeleteAsset()" class="hidden w-full px-6 py-3 rounded-2xl font-bold text-red-600 bg-red-50 hover:bg-red-100 transition-all flex items-center justify-center gap-2">
                            <i data-lucide="trash-2" class="w-5 h-5"></i> ลบทรัพย์สินนี้
                        </button>
                    </div>
                </div>
                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="closeAssetModal()" class="flex-1 px-6 py-3 rounded-2xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-all">ยกเลิก</button>
                    <button type="submit" class="flex-1 bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg shadow-indigo-600/20 hover:bg-indigo-500 transition-all flex items-center justify-center gap-2">
                        <i data-lucide="save" class="w-5 h-5"></i> บันทึกข้อมูล
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Choices.js JS -->
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    <script src="/assets/js/app.js"></script>
    <script>
        // Assets Logic
        let allAssets = [];
        let filteredAssets = [];
        let allUsers = [];
        let allDepts = [];
        let choicesInstances = {};

        // Pagination & Search state
        let currentPage = 1;
        let itemsPerPage = 10;
        let totalItemsCount = 0;
        let totalPagesCount = 1;
        let searchTimer = null;

        async function loadInitialData() {
            // Load settings
            const settings = await ui.getSystemSettings();

            // Check Permissions
            if (!ui.checkAccess('assets', settings, null, 'create')) {
                const btn = document.querySelector('button[onclick="openAssetModal()"]');
                if (btn) btn.remove();
            }
            if (!ui.checkAccess('assets', settings, null, 'view')) {
                document.getElementById('exportAssetsBtn')?.remove();
            }

            // Load main data immediately
            loadAssets();

            // Load meta data in background
            try {
                const results = await Promise.allSettled([
                    apiFetch('/api/users?action=getOptions', { silent: true }),
                    apiFetch('/api/departments', { silent: true }),
                    apiFetch('/api/categories', { silent: true })
                ]);
                
                const userRes = results[0].status === 'fulfilled' ? results[0].value : null;
                const deptRes = results[1].status === 'fulfilled' ? results[1].value : null;
                const catRes  = results[2].status === 'fulfilled' ? results[2].value : null;
 
                if (userRes && userRes.ok) {
                    allUsers = await userRes.json().catch(() => ({ roles: [], branches: [], departments: [] }));
                    const usersArray = Array.isArray(allUsers) ? allUsers : (allUsers.users || []);
                    const userSelect = document.getElementById('assetUser');
                    if (userSelect) {
                        userSelect.innerHTML = '<option value="">ไม่มี (Stock)</option>' + 
                            usersArray.map(u => `<option value="${u.id}">${escapeHTML(u.name)}</option>`).join('');
                        ui.initChoices();
                    }
                }
                
                if (deptRes && deptRes.ok) {
                    allDepts = await deptRes.json().catch(() => []);
                    const deptSelect = document.getElementById('assetDept');
                    if (deptSelect) {
                        deptSelect.innerHTML = '<option value="">ไม่มีแผนก</option>' + 
                            allDepts.map(d => `<option value="${d.id}">${escapeHTML(d.name)}</option>`).join('');
                        ui.initChoices();
                    }
                }

                if (catRes && catRes.ok) {
                    const cats = await catRes.json().catch(() => []);
                    const catSelect = document.getElementById('assetCategory');
                    if (catSelect && cats.length > 0) {
                        catSelect.innerHTML = cats.map(c => `<option value="${escapeHTML(c.name)}">${escapeHTML(c.name)}</option>`).join('');
                        ui.initChoices();
                    }
                }
            } catch (err) {
                console.error('Failed to load background data:', err);
            }
        }

        async function loadAssets() {
            const tableBodyId = 'assetTableBody';
            ui.renderTableLoading(tableBodyId, 6, 'กำลังโหลดข้อมูลทรัพย์สิน...');
            const searchTerm = document.getElementById('assetSearch')?.value || '';
            
            try {
                const start = (currentPage - 1) * itemsPerPage + 1;
                const end = currentPage * itemsPerPage;
                const params = new URLSearchParams({
                    start: start,
                    end: end,
                    search: searchTerm
                });

                const response = await apiFetch(`/api/assets?${params.toString()}`);
                if (!response || !response.ok) {
                    const errorData = response ? await response.json().catch(() => ({})) : {};
                    throw new Error(errorData.message || `Error ${response?.status || 'Network'}`);
                }

                const data = await response.json();
                allAssets = data.assets;
                filteredAssets = data.assets; // Now everything is filtered by server
                totalItemsCount = data.totalCount;
                totalPagesCount = data.totalPages;
                
                renderAssets();
            } catch (err) {
                console.error('Load Assets Error:', err);
                tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-10 text-center text-red-500">
                    <div class="flex flex-col items-center gap-2">
                        <i data-lucide="alert-circle" class="w-8 h-8"></i>
                        <span>เกิดข้อผิดพลาด: ${err.message}</span>
                        <button onclick="loadAssets()" class="mt-2 text-xs text-indigo-600 underline">ลองใหม่อีกครั้ง</button>
                    </div>
                </td></tr>`;
                lucide.createIcons();
            }
        }

        function renderAssets() {
            const tbody = document.getElementById('assetTableBody');
            if (filteredAssets.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-10 text-center text-slate-400">ไม่พบข้อมูลทรัพย์สิน</td></tr>';
                updatePagination();
                return;
            }

            const pagedAssets = filteredAssets; // Data is already paged from server

            // Document fragment for better performance
            const fragment = document.createDocumentFragment();
            pagedAssets.forEach(a => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-slate-50 transition-colors';
                
                const canEdit = ui.checkAccess('assets', null, null, 'edit');
                
                tr.innerHTML = `
                    <td class="px-6 py-4">
                        <div class="font-bold text-slate-800 text-sm">${escapeHTML(a.asset_tag)}</div>
                        <div class="text-[10px] text-slate-400 font-medium">S/N: ${escapeHTML(a.serial_number)}</div>
                    </td>
                    <td class="px-6 py-4">
                        <div class="text-sm font-semibold text-slate-700">${escapeHTML(a.name)}</div>
                        <div class="text-[10px] text-slate-400">${escapeHTML(a.model || '')}</div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-3 py-1 bg-slate-100 text-slate-600 rounded-full text-[10px] font-bold uppercase tracking-wider">${escapeHTML(a.category)}</span>
                    </td>
                    <td class="px-6 py-4">
                        <div class="text-sm font-medium text-slate-600">${escapeHTML(a.assigned_to_name || 'Stock')}</div>
                        <div class="text-[10px] text-slate-400">${escapeHTML(a.department_name || '-')}</div>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <span class="${ui.getBadgeClass('status', a.status)}">
                            ${a.status}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <div class="flex justify-end gap-1">
                            <button onclick="window.location.href='/asset-detail.html?id=${a.id}'" class="p-2 text-slate-400 hover:text-emerald-600 hover:bg-emerald-50 rounded-xl transition-all active:scale-95" title="ดูรายละเอียด">
                                <i data-lucide="search" class="w-4 h-4"></i>
                            </button>
                            ${canEdit ? `
                            <button onclick="editAsset('${a.id}')" class="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition-all active:scale-95" title="แก้ไข">
                                <i data-lucide="edit-3" class="w-4 h-4"></i>
                            </button>` : ''}
                        </div>
                    </td>
                `;
                fragment.appendChild(tr);
            });
            tbody.innerHTML = '';
            tbody.appendChild(fragment);
            lucide.createIcons();
            ui.renderPagination('pageNumbers', currentPage, totalPagesCount, totalItemsCount, itemsPerPage);
        }

        function goToPage(page) {
            if (page < 1 || page > totalPagesCount) return;
            currentPage = page;
            loadAssets();
        }

        document.getElementById('prevPage').addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                loadAssets();
            }
        });

        document.getElementById('nextPage').addEventListener('click', () => {
            if (currentPage < totalPagesCount) {
                currentPage++;
                loadAssets();
            }
        });

        document.getElementById('itemsPerPageSelect').addEventListener('change', (e) => {
            itemsPerPage = parseInt(e.target.value);
            currentPage = 1;
            loadAssets();
        });

        // Modal Controls
        function openAssetModal() {
            document.getElementById('modalTitle').innerText = 'เพิ่มทรัพย์สินใหม่';
            document.getElementById('assetForm').reset();
            document.getElementById('assetId').value = '';
            
            // Reset Choices
            Object.values(ui.choicesInstances).forEach(instance => instance.setChoiceByValue(''));
            
            document.getElementById('deleteAssetBtn').classList.add('hidden');
            document.getElementById('assetModal').classList.remove('hidden');
        }

        function closeAssetModal() {
            document.getElementById('assetModal').classList.add('hidden');
        }

        async function editAsset(id) {
            const asset = allAssets.find(a => a.id === id);
            if (!asset) return;

            document.getElementById('modalTitle').innerText = 'แก้ไขข้อมูลทรัพย์สิน';
            document.getElementById('assetId').value = asset.id;
            document.getElementById('assetTag').value = asset.asset_tag;
            document.getElementById('serialNumber').value = asset.serial_number;
            document.getElementById('assetName').value = asset.name;
            document.getElementById('assetModel').value = asset.model || '';
            
            // Set Choices values
            if (ui.choicesInstances['assetCategory']) ui.choicesInstances['assetCategory'].setChoiceByValue(asset.category);
            if (ui.choicesInstances['assetStatus']) ui.choicesInstances['assetStatus'].setChoiceByValue(asset.status);
            if (ui.choicesInstances['assetUser']) ui.choicesInstances['assetUser'].setChoiceByValue(asset.assigned_to || '');
            if (ui.choicesInstances['assetDept']) ui.choicesInstances['assetDept'].setChoiceByValue(asset.department_id || '');
            
            if (asset.purchase_date) {
                document.getElementById('assetPurchaseDate').value = asset.purchase_date.split('T')[0];
            } else {
                document.getElementById('assetPurchaseDate').value = '';
            }

            const canDelete = ui.checkAccess('assets', null, null, 'delete');
            if (canDelete) {
                document.getElementById('deleteAssetBtn').classList.remove('hidden');
            } else {
                document.getElementById('deleteAssetBtn').classList.add('hidden');
            }
            document.getElementById('assetModal').classList.remove('hidden');
        }

        async function confirmDeleteAsset() {
            const id = document.getElementById('assetId').value;
            if (!id) return;

            const confirmed = await notify.confirm('ยืนยันการลบ', 'คุณแน่ใจหรือไม่ว่าต้องการลบทรัพย์สินนี้? ข้อมูลจะไม่สามารถกู้คืนได้');
            if (confirmed) {
                try {
                    const response = await apiFetch(`/api/assets?action=delete&id=${id}`, {
                        method: 'POST'
                    });

                    if (response.ok) {
                        notify.success('ลบทรัพย์สินเรียบร้อยแล้ว');
                        closeAssetModal();
                        loadAssets();
                    } else {
                        const err = await response.json();
                        notify.error(err.message || 'เกิดข้อผิดพลาดในการลบ');
                    }
                } catch (err) {
                    notify.error('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้');
                }
            }
        }

        document.getElementById('assetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('assetId').value;
            const data = {
                id: id || null,
                asset_tag: document.getElementById('assetTag').value,
                serial_number: document.getElementById('serialNumber').value,
                name: document.getElementById('assetName').value,
                model: document.getElementById('assetModel').value,
                category: document.getElementById('assetCategory').value,
                status: document.getElementById('assetStatus').value,
                assigned_to: document.getElementById('assetUser').value || null,
                department_id: document.getElementById('assetDept').value || null,
                purchase_date: document.getElementById('assetPurchaseDate').value || null
            };

            try {
                const response = await apiFetch('/api/assets', {
                    method: 'POST',
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    notify.success(id ? 'แก้ไขข้อมูลสำเร็จ' : 'เพิ่มทรัพย์สินสำเร็จ');
                    closeAssetModal();
                    loadAssets();
                } else {
                    const err = await response.json();
                    notify.error(err.message || 'เกิดข้อผิดพลาด');
                }
            } catch (err) {
                notify.error('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้');
            }
        });

        // Search logic with 1s Debounce
        document.getElementById('assetSearch').addEventListener('input', (e) => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                currentPage = 1;
                loadAssets();
            }, 1000);
        });

        // Export Assets (Server-side)
        document.getElementById('exportAssetsBtn')?.addEventListener('click', () => {
            const token = localStorage.getItem('token');
            if (!token) return notify.error('เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่');

            // Native browser download via direct URL
            window.location.href = `/api/assets?action=export&token=${token}`;
            notify.success('กำลังดาวน์โหลดข้อมูล...');
        });

        document.addEventListener('DOMContentLoaded', loadInitialData);
    </script>
</body>
</html>

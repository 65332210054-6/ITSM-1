<!DOCTYPE html>
<html lang="th" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ข้อมูลส่วนตัว | ITSM Admin</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.454.0/lucide.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', 'Sarabun', sans-serif; }
    </style>
</head>
<body class="h-full flex overflow-hidden">
    <div id="sidebarOverlay" class="fixed inset-0 bg-slate-900/50 z-40 hidden transition-opacity lg:hidden"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-slate-900 text-white flex flex-col h-full shadow-2xl transition-transform duration-300 z-50 -translate-x-full lg:translate-x-0 lg:static">
        <div class="h-20 flex items-center justify-between px-6 border-b border-slate-800">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-blue-400 rounded-xl flex items-center justify-center text-white font-bold text-lg shadow-lg shadow-indigo-500/30">IT</div>
                <div>
                    <span class="font-bold text-base tracking-tight block leading-tight">ITSM</span>
                    <span class="text-[10px] text-slate-400 block leading-tight font-medium">Enterprise Admin</span>
                </div>
            </div>
            <button id="closeSidebar" class="lg:hidden text-slate-400 hover:text-white p-1"><i data-lucide="x" class="h-6 w-6"></i></button>
        </div>
        <nav class="flex-1 py-6 overflow-y-auto">
            <div class="px-6 mb-4">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.1em]">หลัก (Main)</p>
            </div>
            <div class="space-y-1 px-3">
                <a href="/" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all">
                    <i data-lucide="layout-dashboard" class="mr-3 h-5 w-5"></i> หน้าแรก
                </a>
                <a href="/users.html" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all">
                    <i data-lucide="users" class="mr-3 h-5 w-5"></i> จัดการผู้ใช้งาน
                </a>
                <a href="/settings.html" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all">
                    <i data-lucide="settings" class="mr-3 h-5 w-5"></i> ตั้งค่าระบบ
                </a>
            </div>
        </nav>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-4 sm:px-10 shadow-sm z-10">
            <div class="flex items-center gap-4">
                <button id="openSidebar" class="lg:hidden text-slate-500 hover:text-indigo-600 p-2 rounded-xl hover:bg-slate-50 transition-all"><i data-lucide="menu" class="h-6 w-6"></i></button>
                <h1 class="text-lg sm:text-xl font-bold text-slate-800 tracking-tight">ข้อมูลส่วนตัว</h1>
            </div>
            <div class="flex items-center gap-2 sm:gap-4">
                <div class="text-right hidden md:block">
                    <p id="userName" class="text-sm font-bold text-slate-800 leading-tight">Loading...</p>
                    <p id="userRole" class="text-[10px] text-slate-500 font-bold uppercase tracking-wider leading-tight">System Admin</p>
                    <p id="currentTime" class="text-[10px] font-semibold text-slate-500 mt-0.5">30/03/2026</p>
                </div>
                <button class="flex items-center gap-3 p-1 rounded-2xl hover:bg-slate-50 transition-all border border-transparent hover:border-slate-100">
                    <div id="userAvatar" class="w-9 h-9 sm:w-10 sm:h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-blue-500 flex items-center justify-center text-white font-bold text-xs sm:text-sm shadow-lg shadow-indigo-500/20">U</div>
                </button>
                <button id="logoutBtn" class="w-9 h-9 sm:w-10 sm:h-10 flex items-center justify-center rounded-xl text-slate-400 hover:text-red-500 hover:bg-red-50 transition-all group" title="ออกจากระบบ">
                    <i data-lucide="log-out" class="h-5 w-5 group-hover:translate-x-0.5 transition-transform"></i>
                </button>
            </div>
        </header>

        <main class="flex-1 overflow-x-hidden overflow-y-auto p-4 sm:p-10 bg-slate-50/50">
            <div class="max-w-3xl mx-auto">
                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="h-32 bg-gradient-to-r from-indigo-600 to-blue-500"></div>
                    <div class="px-8 pb-8">
                        <div class="relative -mt-12 mb-6 flex justify-center sm:justify-start">
                            <div class="relative group">
                                <div id="profileAvatarLarge" class="w-24 h-24 sm:w-32 sm:h-32 rounded-3xl bg-white p-1.5 shadow-xl">
                                    <div class="w-full h-full rounded-2xl bg-slate-100 flex items-center justify-center text-slate-400 overflow-hidden">
                                        <i data-lucide="user" class="w-12 h-12"></i>
                                    </div>
                                </div>
                                <label for="avatarInput" class="absolute bottom-2 right-2 w-8 h-8 sm:w-10 sm:h-10 bg-indigo-600 text-white rounded-xl flex items-center justify-center cursor-pointer shadow-lg hover:bg-indigo-500 transition-all active:scale-95 border-4 border-white">
                                    <i data-lucide="camera" class="w-4 h-4 sm:w-5 sm:h-5"></i>
                                    <input type="file" id="avatarInput" class="hidden" accept="image/*">
                                </label>
                            </div>
                        </div>

                        <form id="profileForm" class="space-y-6">
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-sm font-bold text-slate-700 mb-2">ชื่อ-นามสกุล</label>
                                    <input type="text" id="profileName" required class="block w-full px-4 py-3 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-600 outline-none transition-all">
                                </div>
                                <div>
                                    <label class="block text-sm font-bold text-slate-700 mb-2">ชื่อผู้ใช้งาน / อีเมล</label>
                                    <input type="text" id="profileEmail" required class="block w-full px-4 py-3 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-600 outline-none transition-all">
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-2">เปลี่ยนรหัสผ่านใหม่ (ปล่อยว่างหากไม่ต้องการเปลี่ยน)</label>
                                <div class="relative">
                                    <input type="password" id="profilePassword" class="block w-full px-4 py-3 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-600 outline-none transition-all" placeholder="••••••••">
                                </div>
                            </div>

                            <div class="pt-4 border-t border-slate-100 flex justify-end">
                                <button type="submit" class="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg shadow-indigo-600/20 hover:bg-indigo-500 transition-all active:scale-95 flex items-center gap-2">
                                    <i data-lucide="save" class="w-5 h-5"></i> บันทึกข้อมูล
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/assets/js/app.js"></script>
    <script>
        // Sidebar Toggle
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        function toggleSidebar() {
            sidebar.classList.toggle('-translate-x-full');
            sidebarOverlay.classList.toggle('hidden');
        }
        document.getElementById('openSidebar')?.addEventListener('click', toggleSidebar);
        document.getElementById('closeSidebar')?.addEventListener('click', toggleSidebar);
        sidebarOverlay?.addEventListener('click', toggleSidebar);

        // Load Current Profile
        function loadProfile() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            document.getElementById('profileName').value = user.name || '';
            document.getElementById('profileEmail').value = user.email || '';
            
            if (user.avatar_url) {
                document.getElementById('profileAvatarLarge').innerHTML = `<img src="${user.avatar_url}" class="w-full h-full rounded-2xl object-cover">`;
            }
        }

        // Handle Avatar Upload (Base64 for simplicity in this demo)
        document.getElementById('avatarInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const base64 = event.target.result;
                    document.getElementById('profileAvatarLarge').innerHTML = `<img src="${base64}" class="w-full h-full rounded-2xl object-cover">`;
                    // In a real app, you'd upload this to a server/S3
                };
                reader.readAsDataURL(file);
            }
        });

        // Handle Form Submit
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userObj = JSON.parse(localStorage.getItem('user') || '{}');
            const name = document.getElementById('profileName').value;
            const email = document.getElementById('profileEmail').value;
            const password = document.getElementById('profilePassword').value;
            const avatarImg = document.querySelector('#profileAvatarLarge img');
            const avatarUrl = avatarImg ? avatarImg.src : null;

            try {
                const response = await apiFetch('/api/profile', {
                    method: 'POST',
                    body: JSON.stringify({ id: userObj.id, name, email, password, avatar_url: avatarUrl })
                });

                if (response.ok) {
                    const result = await response.json();
                    localStorage.setItem('user', JSON.stringify(result.user));
                    notify.success('บันทึกข้อมูลส่วนตัวสำเร็จ!');
                    setTimeout(() => window.location.reload(), 1500);
                } else {
                    const err = await response.json();
                    notify.error(err.message || 'เกิดข้อผิดพลาด');
                }
            } catch (err) {
                notify.error('เกิดข้อผิดพลาดในการเชื่อมต่อ');
            }
        });

        document.addEventListener('DOMContentLoaded', loadProfile);
    </script>
</body>
</html>

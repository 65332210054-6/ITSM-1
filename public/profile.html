<!DOCTYPE html>
<html lang="th" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ข้อมูลส่วนตัว | ITSM Admin</title>
    <script>
        if (!localStorage.getItem('token')) {
            window.location.replace('/login.html');
        }
    </script>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.454.0/lucide.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body class="h-full flex overflow-hidden">
    <div id="sidebarOverlay" class="fixed inset-0 bg-slate-900/50 z-40 hidden transition-opacity lg:hidden"></div>

    <!-- Sidebar Container (Client-side rendered) -->
    <div id="sidebar-container" class="lg:static"></div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <!-- Header Container (Client-side rendered) -->
        <div id="header-container"></div>

        <main class="flex-1 overflow-x-hidden overflow-y-auto p-4 sm:p-10 bg-slate-50/50">
            <div class="max-w-3xl mx-auto">
                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="h-32 bg-gradient-to-r from-indigo-600 to-blue-500"></div>
                    <div class="px-8 pb-8">
                        <div class="relative -mt-12 mb-6 flex justify-center sm:justify-start">
                            <div class="relative group">
                                <div id="profileAvatarLarge" class="w-24 h-24 sm:w-32 sm:h-32 rounded-3xl bg-white p-1.5 shadow-xl">
                                    <div class="w-full h-full rounded-2xl bg-slate-100 flex items-center justify-center text-slate-400 overflow-hidden">
                                        <i data-lucide="user" class="w-12 h-12"></i>
                                    </div>
                                </div>
                                <label for="avatarInput" class="absolute bottom-2 right-2 w-8 h-8 sm:w-10 sm:h-10 bg-indigo-600 text-white rounded-xl flex items-center justify-center cursor-pointer shadow-lg hover:bg-indigo-500 transition-all active:scale-90 border-4 border-white">
                                    <i data-lucide="camera" class="w-4 h-4 sm:w-5 sm:h-5"></i>
                                    <input type="file" id="avatarInput" class="hidden" accept="image/*">
                                </label>
                            </div>
                        </div>

                        <form id="profileForm" class="space-y-6">
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                <div>
                                    <label class="form-label">ชื่อ-นามสกุล</label>
                                    <input type="text" id="profileName" required class="form-input">
                                </div>
                                <div>
                                    <label class="form-label">ชื่อผู้ใช้งาน / อีเมล</label>
                                    <input type="text" id="profileEmail" required class="form-input">
                                </div>
                                <div>
                                    <label class="form-label">ตำแหน่ง / บทบาท</label>
                                    <input type="text" id="profileRole" readonly class="form-input bg-slate-50 text-slate-500 cursor-not-allowed" title="แก้ไขได้โดยผู้ดูแลระบบเท่านั้น">
                                </div>
                                <div>
                                    <label class="form-label">เบอร์โทรศัพท์</label>
                                    <input type="text" id="profilePhone" class="form-input" placeholder="0xxxxxxxx">
                                </div>
                                <div>
                                    <label class="form-label">สาขา</label>
                                    <input type="text" id="profileBranch" readonly class="form-input bg-slate-50 text-slate-500 cursor-not-allowed">
                                </div>
                                <div>
                                    <label class="form-label">แผนก</label>
                                    <input type="text" id="profileDept" readonly class="form-input bg-slate-50 text-slate-500 cursor-not-allowed">
                                </div>
                            </div>

                            <div class="pt-4 border-t border-slate-100">
                                <label class="form-label">เปลี่ยนรหัสผ่านใหม่ (ปล่อยว่างหากไม่ต้องการเปลี่ยน)</label>
                                <div class="relative">
                                    <input type="password" id="profilePassword" class="form-input" placeholder="••••••••">
                                </div>
                            </div>

                            <div class="pt-4 border-t border-slate-100 flex justify-end">
                                <button type="submit" class="btn-primary px-8 py-3">
                                    <i data-lucide="save" class="w-5 h-5"></i> บันทึกข้อมูล
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/assets/js/app.js"></script>
    <script>

        // Load Current Profile from API for fresh data
        async function loadProfile() {
            try {
                const response = await apiFetch('/api/profile');
                if (!response.ok) throw new Error('Failed to fetch');
                const { user } = await response.json();
                
                document.getElementById('profileName').value = user.name || '';
                document.getElementById('profileEmail').value = user.email || '';
                document.getElementById('profilePhone').value = user.phone || '';
                document.getElementById('profileRole').value = user.role || user.role_name || 'User';
                document.getElementById('profileBranch').value = user.branch_name || '-';
                document.getElementById('profileDept').value = user.department_name || '-';
                
                if (user.avatar_url) {
                    document.getElementById('profileAvatarLarge').innerHTML = `<img src="${user.avatar_url}" class="w-full h-full rounded-2xl object-cover">`;
                }
                
                // Also update header if data changed
                localStorage.setItem('user', JSON.stringify({ ...JSON.parse(localStorage.getItem('user') || '{}'), ...user }));
            } catch (err) {
                console.error('Load Profile Error:', err);
                // Fallback to LocalStorage
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                document.getElementById('profileName').value = user.name || '';
                document.getElementById('profileEmail').value = user.email || '';
                document.getElementById('profilePhone').value = user.phone || '';
            }
        }

        // Handle Avatar Upload
        document.getElementById('avatarInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const base64 = event.target.result;
                    document.getElementById('profileAvatarLarge').innerHTML = `<img src="${base64}" class="w-full h-full rounded-2xl object-cover">`;
                };
                reader.readAsDataURL(file);
            }
        });

        // Handle Form Submit
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userObj = JSON.parse(localStorage.getItem('user') || '{}');
            const name = document.getElementById('profileName').value;
            const email = document.getElementById('profileEmail').value;
            const phone = document.getElementById('profilePhone').value;
            const password = document.getElementById('profilePassword').value;
            const avatarImg = document.querySelector('#profileAvatarLarge img');
            const avatarUrl = avatarImg ? avatarImg.src : null;

            try {
                const response = await apiFetch('/api/profile', {
                    method: 'POST',
                    body: JSON.stringify({ id: userObj.id, name, email, phone, password, avatar_url: avatarUrl })
                });

                if (response.ok) {
                    const result = await response.json();
                    localStorage.setItem('user', JSON.stringify({ ...userObj, ...result.user }));
                    notify.success('บันทึกข้อมูลส่วนตัวสำเร็จ!');
                    setTimeout(() => window.location.reload(), 1500);
                } else {
                    const err = await response.json();
                    notify.error(err.message || 'เกิดข้อผิดพลาด');
                }
            } catch (err) {
                notify.error('เกิดข้อผิดพลาดในการเชื่อมต่อ');
            }
        });

        document.addEventListener('DOMContentLoaded', loadProfile);
    </script>
</body>
</html>

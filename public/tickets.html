<!DOCTYPE html>
<html lang="th" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแจ้งซ่อม | ITSM Admin</title>
    <script>
        if (!localStorage.getItem('token')) {
            window.location.replace('/login.html');
        }
    </script>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.454.0/lucide.min.css" rel="stylesheet">
    <!-- Choices.js CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body class="h-full flex overflow-hidden">
    <!-- Mobile Sidebar Overlay -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-slate-900/50 z-40 hidden transition-opacity lg:hidden"></div>

    <!-- Sidebar Container (Client-side rendered) -->
    <div id="sidebar-container" class="lg:static"></div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="page-header">
            <div class="flex items-center gap-4">
                <button id="openSidebar" class="lg:hidden text-slate-500 hover:text-indigo-600 p-2 rounded-xl hover:bg-slate-50 transition-all"><i data-lucide="menu" class="h-6 w-6"></i></button>
                <h1 class="text-lg sm:text-xl font-bold text-slate-800 tracking-tight">รายการแจ้งซ่อมและบริการ</h1>
            </div>
            <div class="flex items-center gap-2 sm:gap-6">
                <div class="flex items-center gap-2 sm:gap-4">
                    <div class="text-right hidden md:block">
                        <p id="userName" class="text-sm font-bold text-slate-800 leading-tight">Loading...</p>
                        <p id="userRole" class="text-[10px] text-slate-500 font-bold uppercase tracking-wider leading-tight">System Admin</p>
                        <p id="currentTime" class="text-[10px] font-semibold text-slate-500 mt-0.5">30/03/2026</p>
                    </div>
                    <button onclick="window.location.href='/profile.html'" class="flex items-center gap-3 p-1 rounded-2xl hover:bg-slate-50 transition-all">
                        <div id="userAvatar" class="w-9 h-9 sm:w-10 sm:h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-blue-500 flex items-center justify-center text-white font-bold text-xs sm:text-sm shadow-lg shadow-indigo-500/20 overflow-hidden">U</div>
                    </button>
                    <button id="logoutBtn" class="w-9 h-9 sm:w-10 sm:h-10 flex items-center justify-center rounded-xl text-slate-400 hover:text-red-500 hover:bg-red-50 transition-all group">
                        <i data-lucide="log-out" class="h-5 w-5 group-hover:translate-x-0.5 transition-transform"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-x-hidden overflow-y-auto p-4 sm:p-10 bg-slate-50/50">
            <div class="max-w-6xl mx-auto space-y-6 sm:space-y-10">
                <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
                    <div class="flex items-center gap-4 w-full md:w-auto">
                        <div class="relative w-full md:w-80">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                                <i data-lucide="search" class="w-5 h-5"></i>
                            </div>
                            <input type="text" id="ticketSearch" placeholder="ค้นหาเลขที่แจ้ง, อาการ..." 
                                class="block w-full pl-12 pr-4 py-3 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-600 outline-none transition-all shadow-sm bg-white">
                        </div>
                    </div>
                    <button onclick="openTicketModal()" class="w-full md:w-auto btn-primary">
                        <i data-lucide="plus" class="w-5 h-5"></i> เปิดใบแจ้งซ่อมใหม่
                    </button>
                </div>

                <div class="card">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[900px]">
                            <thead>
                                <tr class="bg-slate-50 border-b border-slate-200">
                                    <th class="th-cell">Ticket ID</th>
                                    <th class="th-cell">หัวข้อ / อาการแจ้ง</th>
                                    <th class="th-cell">ผู้แจ้ง / แผนก</th>
                                    <th class="th-cell">ความสำคัญ</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-center">สถานะ</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">แก้ไข</th>
                                </tr>
                            </thead>
                            <tbody id="ticketTableBody" class="divide-y divide-slate-100">
                                <tr><td colspan="6" class="px-6 py-10 text-center text-slate-400">กำลังโหลดรายการแจ้งซ่อม...</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <!-- Pagination Footer -->
                    <div class="pagination-footer">
                        <div class="flex items-center gap-4">
                            <div class="text-xs font-bold text-slate-500 uppercase tracking-wider">
                                แสดง <span id="showingStart">0</span> - <span id="showingEnd">0</span> จาก <span id="totalItems">0</span> รายการ
                            </div>
                            <div class="flex items-center gap-2 border-l border-slate-200 pl-4">
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">แสดงหน้าละ:</span>
                                <select id="itemsPerPageSelect">
                                    <option value="10">10</option>
                                    <option value="20">20</option>
                                    <option value="30">30</option>
                                    <option value="50">50</option>
                                </select>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <button id="prevPage" class="p-2 rounded-xl text-slate-400 hover:text-indigo-600 hover:bg-white transition-all disabled:opacity-30 disabled:cursor-not-allowed" disabled>
                                <i data-lucide="chevron-left" class="w-5 h-5"></i>
                            </button>
                            <div id="pageNumbers" class="flex items-center gap-1">
                                <!-- Page numbers will be injected here -->
                            </div>
                            <button id="nextPage" class="p-2 rounded-xl text-slate-400 hover:text-indigo-600 hover:bg-white transition-all disabled:opacity-30 disabled:cursor-not-allowed" disabled>
                                <i data-lucide="chevron-right" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Ticket Modal -->
    <div id="ticketModal" class="fixed inset-0 bg-slate-900/50 z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl animate-in fade-in zoom-in duration-200">
            <div class="px-8 py-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/50 rounded-t-3xl">
                <h2 id="modalTitle" class="text-xl font-bold text-slate-800 tracking-tight">เปิดใบแจ้งซ่อมใหม่</h2>
                <button onclick="closeTicketModal()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <form id="ticketForm" class="p-8 space-y-5">
                <input type="hidden" id="ticketId">
                <div>
                    <label class="form-label">หัวข้อ / อาการแจ้งเบื้องต้น</label>
                    <input type="text" id="ticketSubject" required class="form-input" placeholder="เช่น คอมพิวเตอร์เปิดไม่ติด, อินเทอร์เน็ตใช้งานไม่ได้">
                </div>
                <div>
                    <label class="form-label">รายละเอียดเพิ่มเติม</label>
                    <textarea id="ticketDesc" rows="3" class="form-input" placeholder="อธิบายรายละเอียดของปัญหาที่พบ..."></textarea>
                </div>
                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="form-label">ความสำคัญ</label>
                        <select id="ticketPriority" required class="form-input">
                            <option value="Low">ต่ำ (Low)</option>
                            <option value="Medium" selected>ปกติ (Medium)</option>
                            <option value="High">สูง (High)</option>
                            <option value="Critical">เร่งด่วนที่สุด (Critical)</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">ทรัพย์สินที่เกี่ยวข้อง</label>
                        <select id="ticketAsset" class="form-input">
                            <option value="">ไม่ระบุทรัพย์สิน</option>
                        </select>
                    </div>
                </div>
                <div id="adminFields" class="hidden space-y-5 pt-2 border-t border-slate-100">
                    <div class="grid grid-cols-2 gap-5">
                        <div>
                            <label class="form-label">สถานะการดำเนินการ</label>
                            <select id="ticketStatus" class="form-input">
                                <option value="Open">รอดำเนินการ (Open)</option>
                                <option value="In Progress">กำลังดำเนินการ (In Progress)</option>
                                <option value="Resolved">แก้ไขเสร็จสิ้น (Resolved)</option>
                                <option value="Closed">ปิดงาน (Closed)</option>
                            </select>
                        </div>
                        <div>
                            <label class="form-label">ช่างที่รับผิดชอบ</label>
                            <select id="ticketAssignee" class="form-input">
                                <option value="">รอมอบหมาย</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="closeTicketModal()" class="flex-1 px-6 py-3 rounded-2xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-all active:scale-95">ยกเลิก</button>
                    <button type="submit" class="flex-1 bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg shadow-indigo-600/20 hover:bg-indigo-500 transition-all active:scale-95 flex items-center justify-center gap-2">
                        <i data-lucide="save" class="w-5 h-5"></i> บันทึกข้อมูล
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Choices.js JS -->
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    <script src="/assets/js/app.js"></script>
    <script>
        // Tickets Logic
        let allTickets = [];
        let filteredTickets = [];
        let technicians = [];
        
        // Pagination state
        let currentPage = 1;
        let itemsPerPage = 10;

        async function loadInitialData() {
            // Initialize Shared UI Components
            ui.initChoices();
            
            // Load tickets immediately
            loadTickets();

            // Load meta data in background
            try {
                const userObj = JSON.parse(localStorage.getItem('user') || '{}');
                const isAdminOrTech = userObj.role === 'Admin' || userObj.role === 'Technician';

                const results = await Promise.allSettled([
                    apiFetch('/api/assets'),
                    isAdminOrTech ? apiFetch('/api/users') : Promise.resolve(null)
                ]);

                const assetRes = results[0].status === 'fulfilled' ? results[0].value : null;
                const userRes = results[1].status === 'fulfilled' ? results[1].value : null;

                if (assetRes && assetRes.ok) {
                    const allAssets = await assetRes.json().catch(() => []);
                    const assetSelect = document.getElementById('ticketAsset');
                    if (assetSelect) {
                        assetSelect.innerHTML = '<option value="">ไม่ระบุทรัพย์สิน</option>' + 
                            allAssets.map(a => `<option value="${a.id}">${escapeHTML(a.asset_tag)} - ${escapeHTML(a.name)}</option>`).join('');
                        if (ui.choicesInstances['ticketAsset']) {
                            ui.choicesInstances['ticketAsset'].destroy();
                            ui.choicesInstances['ticketAsset'] = new Choices(assetSelect, { searchEnabled: false, itemSelectText: '', shouldSort: false, allowHTML: true });
                        }
                    }
                }

                if (userRes && userRes.ok) {
                    const allUsers = await userRes.json().catch(() => []);
                    technicians = allUsers.filter(u => u.role_name === 'Admin' || u.role_name === 'Technician');
                    const assigneeSelect = document.getElementById('ticketAssignee');
                    if (assigneeSelect) {
                        assigneeSelect.innerHTML = '<option value="">รอมอบหมาย</option>' + 
                            technicians.map(t => `<option value="${t.id}">${escapeHTML(t.name)}</option>`).join('');
                        if (choicesInstances['ticketAssignee']) {
                            choicesInstances['ticketAssignee'].destroy();
                            choicesInstances['ticketAssignee'] = new Choices(assigneeSelect, { searchEnabled: false, itemSelectText: '', shouldSort: false, allowHTML: true });
                        }
                    }
                }
            } catch (err) {
                console.error('Failed to load background data:', err);
            }
        }

        async function loadTickets() {
            const tbody = document.getElementById('ticketTableBody');
            try {
                const response = await apiFetch('/api/tickets');
                if (!response || !response.ok) {
                    throw new Error('Failed to fetch tickets');
                }
                allTickets = await response.json();
                filteredTickets = [...allTickets];
                renderTickets();
            } catch (err) {
                console.error('Load Tickets Error:', err);
                tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-10 text-center text-red-500">
                    <div class="flex flex-col items-center gap-2">
                        <i data-lucide="alert-circle" class="w-8 h-8"></i>
                        <span>เกิดข้อผิดพลาด: ${err.message}</span>
                    </div>
                </td></tr>`;
                lucide.createIcons();
            }
        }

        function renderTickets() {
            const tbody = document.getElementById('ticketTableBody');
            if (filteredTickets.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-10 text-center text-slate-400">ไม่พบรายการแจ้งซ่อม</td></tr>';
                updatePagination();
                return;
            }

            // Calculate slices for pagination
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pagedTickets = filteredTickets.slice(startIndex, endIndex);

            const fragment = document.createDocumentFragment();
            pagedTickets.forEach(t => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-slate-50 transition-colors';
                tr.innerHTML = `
                    <td class="px-6 py-4">
                        <div class="font-bold text-slate-800 uppercase tracking-wider text-xs">#TK-${t.id.substring(0, 8)}</div>
                        <div class="text-[10px] text-slate-400 font-medium">${new Date(t.created_at).toLocaleDateString('th-TH')}</div>
                    </td>
                    <td class="px-6 py-4">
                        <div class="text-sm font-semibold text-slate-700">${escapeHTML(t.subject)}</div>
                        <div class="text-[10px] text-slate-400 truncate max-w-xs">${escapeHTML(t.description || 'ไม่มีรายละเอียด')}</div>
                    </td>
                    <td class="px-6 py-4">
                        <div class="text-sm font-medium text-slate-600">${escapeHTML(t.reporter_name || 'System')}</div>
                        <div class="text-[10px] text-slate-400">${escapeHTML(t.department_name || '-')}</div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider ${getPriorityClass(t.priority)}">
                            ${t.priority}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider ${getStatusClass(t.status)}">
                            ${t.status}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="viewTicket('${t.id}')" class="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition-all active:scale-95" title="แก้ไข">
                            <i data-lucide="edit-3" class="w-4 h-4"></i>
                        </button>
                    </td>
                `;
                fragment.appendChild(tr);
            });
            tbody.innerHTML = '';
            tbody.appendChild(fragment);
            lucide.createIcons();
            updatePagination();
        }

        function updatePagination() {
            const totalItems = filteredTickets.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;
            
            // Adjust current page if needed
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            const startIndex = totalItems === 0 ? 0 : (currentPage - 1) * itemsPerPage + 1;
            const endIndex = Math.min(currentPage * itemsPerPage, totalItems);

            document.getElementById('showingStart').innerText = startIndex;
            document.getElementById('showingEnd').innerText = endIndex;
            document.getElementById('totalItems').innerText = totalItems;

            const prevBtn = document.getElementById('prevPage');
            const nextBtn = document.getElementById('nextPage');
            const pageNums = document.getElementById('pageNumbers');

            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === totalPages;

            // Generate page numbers
            let html = '';
            const maxVisiblePages = 3;
            let start = Math.max(1, currentPage - 1);
            let end = Math.min(totalPages, start + maxVisiblePages - 1);
            
            if (end - start + 1 < maxVisiblePages) {
                start = Math.max(1, end - maxVisiblePages + 1);
            }

            for (let i = start; i <= end; i++) {
                html += `
                    <button onclick="goToPage(${i})" class="w-10 h-10 rounded-xl flex items-center justify-center text-sm font-bold transition-all ${i === currentPage ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/20' : 'text-slate-400 hover:text-indigo-600 hover:bg-white'}">
                        ${i}
                    </button>
                `;
            }
            pageNums.innerHTML = html;
        }

        function goToPage(page) {
            currentPage = page;
            renderTickets();
        }

        document.getElementById('prevPage').addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                renderTickets();
            }
        });

        document.getElementById('nextPage').addEventListener('click', () => {
            const totalPages = Math.ceil(filteredTickets.length / itemsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                renderTickets();
            }
        });

        document.getElementById('itemsPerPageSelect').addEventListener('change', (e) => {
            itemsPerPage = parseInt(e.target.value);
            currentPage = 1;
            renderTickets();
        });

        function getPriorityClass(p) {
            switch(p) {
                case 'Low': return 'bg-slate-100 text-slate-600';
                case 'Medium': return 'bg-blue-50 text-blue-600';
                case 'High': return 'bg-amber-50 text-amber-600';
                case 'Critical': return 'bg-red-50 text-red-600 animate-pulse';
                default: return 'bg-slate-50 text-slate-600';
            }
        }

        function getStatusClass(s) {
            switch(s) {
                case 'Open': return 'bg-indigo-50 text-indigo-600';
                case 'In Progress': return 'bg-blue-50 text-blue-600';
                case 'Resolved': return 'bg-emerald-50 text-emerald-600';
                case 'Closed': return 'bg-slate-100 text-slate-400';
                default: return 'bg-slate-50 text-slate-600';
            }
        }

        function openTicketModal() {
            document.getElementById('modalTitle').innerText = 'เปิดใบแจ้งซ่อมใหม่';
            document.getElementById('ticketForm').reset();
            document.getElementById('ticketId').value = '';
            document.getElementById('adminFields').classList.add('hidden');
            
            // Reset Choices
            Object.values(ui.choicesInstances).forEach(instance => {
                instance.setChoiceByValue('');
            });
            // Specific defaults
            if (ui.choicesInstances['ticketPriority']) ui.choicesInstances['ticketPriority'].setChoiceByValue('Medium');
            if (ui.choicesInstances['ticketStatus']) ui.choicesInstances['ticketStatus'].setChoiceByValue('Open');

            document.getElementById('ticketModal').classList.remove('hidden');
        }

        function closeTicketModal() {
            document.getElementById('ticketModal').classList.add('hidden');
        }

        async function viewTicket(id) {
            const ticket = allTickets.find(t => t.id === id);
            if (!ticket) return;

            const userObj = JSON.parse(localStorage.getItem('user') || '{}');
            const isAdminOrTech = userObj.role === 'Admin' || userObj.role === 'Technician';

            document.getElementById('modalTitle').innerText = 'จัดการใบแจ้งซ่อม';
            document.getElementById('ticketId').value = ticket.id;
            document.getElementById('ticketSubject').value = ticket.subject;
            document.getElementById('ticketDesc').value = ticket.description || '';
            
            // Set Choices values
            if (ui.choicesInstances['ticketPriority']) ui.choicesInstances['ticketPriority'].setChoiceByValue(ticket.priority);
            if (ui.choicesInstances['ticketAsset']) ui.choicesInstances['ticketAsset'].setChoiceByValue(ticket.asset_id || '');
            
            if (isAdminOrTech) {
                document.getElementById('adminFields').classList.remove('hidden');
                if (ui.choicesInstances['ticketStatus']) ui.choicesInstances['ticketStatus'].setChoiceByValue(ticket.status);
                if (ui.choicesInstances['ticketAssignee']) ui.choicesInstances['ticketAssignee'].setChoiceByValue(ticket.assigned_to || '');
            } else {
                document.getElementById('adminFields').classList.add('hidden');
            }

            document.getElementById('ticketModal').classList.remove('hidden');
        }

        document.getElementById('ticketForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('ticketId').value;
            const userObj = JSON.parse(localStorage.getItem('user') || '{}');
            const isAdminOrTech = userObj.role === 'Admin' || userObj.role === 'Technician';

            const data = {
                id: id || null,
                subject: document.getElementById('ticketSubject').value,
                description: document.getElementById('ticketDesc').value,
                priority: document.getElementById('ticketPriority').value,
                asset_id: document.getElementById('ticketAsset').value || null,
                reporter_id: id ? undefined : userObj.id // Only for new
            };

            if (isAdminOrTech && id) {
                data.status = document.getElementById('ticketStatus').value;
                data.assigned_to = document.getElementById('ticketAssignee').value || null;
            }

            try {
                const response = await apiFetch('/api/tickets', {
                    method: 'POST',
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    notify.success(id ? 'อัปเดตข้อมูลสำเร็จ' : 'ส่งใบแจ้งซ่อมสำเร็จ');
                    closeTicketModal();
                    loadTickets();
                } else {
                    const err = await response.json();
                    notify.error(err.message || 'เกิดข้อผิดพลาด');
                }
            } catch (err) {
                notify.error('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้');
            }
        });

        // Search logic
        document.getElementById('ticketSearch').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase().trim();
            if (!term) {
                filteredTickets = [...allTickets];
            } else {
                const terms = term.split(/\s+/);
                filteredTickets = allTickets.filter(t => {
                    const searchText = [
                        t.id,
                        `#tk-${t.id.substring(0, 8)}`,
                        t.subject,
                        t.description || '',
                        t.reporter_name || '',
                        t.department_name || '',
                        t.status,
                        t.priority
                    ].join(' ').toLowerCase();
                    
                    return terms.every(w => searchText.includes(w));
                });
            }
            currentPage = 1; // Reset to first page on search
            renderTickets();
        });

        document.addEventListener('DOMContentLoaded', loadInitialData);
    </script>
</body>
</html>

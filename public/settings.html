<!DOCTYPE html>
<html lang="th" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตั้งค่าระบบ | ITSM Admin</title>
    <script>
        // Check Auth immediately to prevent flicker
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/login.html';
        }
    </script>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.454.0/lucide.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', 'Sarabun', sans-serif; }
    </style>
</head>
<body class="h-full flex overflow-hidden">
    <!-- Mobile Sidebar Overlay -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-slate-900/50 z-40 hidden transition-opacity lg:hidden"></div>

    <!-- Sidebar (Same as index.html) -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-slate-900 text-white flex flex-col h-full shadow-2xl transition-transform duration-300 z-50 -translate-x-full lg:translate-x-0 lg:static">
        <div class="h-20 flex items-center justify-between px-6 border-b border-slate-800">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-blue-400 rounded-xl flex items-center justify-center text-white font-bold text-lg shadow-lg shadow-indigo-500/30">IT</div>
                <div>
                    <span class="font-bold text-base tracking-tight block leading-tight">ITSM</span>
                    <span class="text-[10px] text-slate-400 block leading-tight font-medium">Enterprise Admin</span>
                </div>
            </div>
            <!-- Close button for mobile -->
            <button id="closeSidebar" class="lg:hidden text-slate-400 hover:text-white p-1">
                <i data-lucide="x" class="h-6 w-6"></i>
            </button>
        </div>
        <nav class="flex-1 py-6 overflow-y-auto">
            <div class="px-6 mb-4">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.1em]">หลัก (Main)</p>
            </div>
            <div class="space-y-1 px-3">
                <a href="/" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all">
                    <i data-lucide="layout-dashboard" class="mr-3 h-5 w-5"></i> หน้าแรก
                </a>
                <a href="/users.html" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all">
                    <i data-lucide="users" class="mr-3 h-5 w-5"></i> จัดการผู้ใช้งาน
                </a>
                <a href="/settings.html" class="flex items-center px-4 py-3 text-sm font-semibold rounded-xl bg-indigo-600 text-white shadow-lg shadow-indigo-600/20 transition-all">
                    <i data-lucide="settings" class="mr-3 h-5 w-5"></i> ตั้งค่าระบบ
                </a>
            </div>
        </nav>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-4 sm:px-10 shadow-sm z-10">
            <div class="flex items-center gap-4">
                <!-- Mobile Menu Button -->
                <button id="openSidebar" class="lg:hidden text-slate-500 hover:text-indigo-600 p-2 rounded-xl hover:bg-slate-50 transition-all">
                    <i data-lucide="menu" class="h-6 w-6"></i>
                </button>
                <h1 class="text-lg sm:text-xl font-bold text-slate-800 tracking-tight">ตั้งค่าระบบ</h1>
            </div>
            <div class="flex items-center gap-2 sm:gap-6">
                <!-- User Profile Header Section -->
                <div class="flex items-center gap-2 sm:gap-4">
                    <div class="text-right hidden md:block">
                        <p id="userName" class="text-sm font-bold text-slate-800 leading-tight">Loading...</p>
                        <p id="userRole" class="text-[10px] text-slate-500 font-bold uppercase tracking-wider leading-tight">System Admin</p>
                        <p id="currentTime" class="text-[10px] font-semibold text-slate-500 mt-0.5">30/03/2026</p>
                    </div>
                    <div class="relative group">
                        <button onclick="window.location.href='/profile.html'" class="flex items-center gap-3 p-1 rounded-2xl hover:bg-slate-50 transition-all border border-transparent hover:border-slate-100" title="แก้ไขข้อมูลส่วนตัว">
                            <div id="userAvatar" class="w-9 h-9 sm:w-10 sm:h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-blue-500 flex items-center justify-center text-white font-bold text-xs sm:text-sm shadow-lg shadow-indigo-500/20 overflow-hidden">U</div>
                        </button>
                    </div>
                    <button id="logoutBtn" class="w-9 h-9 sm:w-10 sm:h-10 flex items-center justify-center rounded-xl text-slate-400 hover:text-red-500 hover:bg-red-50 transition-all group" title="ออกจากระบบ">
                        <i data-lucide="log-out" class="h-5 w-5 group-hover:translate-x-0.5 transition-transform"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-x-hidden overflow-y-auto p-4 sm:p-10 bg-slate-50/50">
            <div class="max-w-6xl mx-auto space-y-6 sm:space-y-10">
                <!-- Branch Management -->
                <div class="bg-white rounded-2xl sm:rounded-3xl shadow-sm border border-slate-200 p-4 sm:p-8">
                    <div class="flex flex-col sm:flex-row items-center justify-between mb-6 sm:mb-8 gap-4">
                        <div>
                            <h2 class="text-lg sm:text-xl font-bold text-slate-800 tracking-tight">จัดการสาขา</h2>
                            <p class="text-xs sm:text-sm text-slate-400 mt-1 font-medium leading-relaxed">ข้อมูลที่ตั้งและสาขาต่างๆ</p>
                        </div>
                        <button class="w-full sm:w-auto bg-indigo-600 text-white px-6 py-3 rounded-2xl text-sm font-bold shadow-lg shadow-indigo-600/20 hover:bg-indigo-500 transition-all flex items-center justify-center gap-2 active:scale-95">
                            <i data-lucide="plus" class="w-5 h-5"></i> เพิ่มสาขาใหม่
                        </button>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6" id="branchGrid">
                        <!-- Branches will be loaded here -->
                        <div class="p-10 text-center text-slate-400 col-span-full">กำลังโหลดข้อมูลสาขา...</div>
                    </div>
                </div>

                <!-- Department Management -->
                <div class="bg-white rounded-2xl sm:rounded-3xl shadow-sm border border-slate-200 p-4 sm:p-8">
                    <div class="flex flex-col sm:flex-row items-center justify-between mb-6 sm:mb-8 gap-4">
                        <div>
                            <h2 class="text-lg sm:text-xl font-bold text-slate-800 tracking-tight">จัดการแผนก</h2>
                            <p class="text-xs sm:text-sm text-slate-400 mt-1 font-medium leading-relaxed">โครงสร้างแผนกงานภายในบริษัท</p>
                        </div>
                        <button class="w-full sm:w-auto bg-indigo-600 text-white px-6 py-3 rounded-2xl text-sm font-bold shadow-lg shadow-indigo-600/20 hover:bg-indigo-500 transition-all flex items-center justify-center gap-2 active:scale-95">
                            <i data-lucide="plus" class="w-5 h-5"></i> เพิ่มแผนกใหม่
                        </button>
                    </div>
                    <div class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6" id="deptGrid">
                        <!-- Departments will be loaded here -->
                        <div class="p-10 text-center text-slate-400 col-span-full">กำลังโหลดข้อมูลแผนก...</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/assets/js/app.js"></script>
    <script>
        // Mobile Sidebar Toggle
        const openSidebar = document.getElementById('openSidebar');
        const closeSidebar = document.getElementById('closeSidebar');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');

        function toggleSidebar() {
            sidebar.classList.toggle('-translate-x-full');
            sidebarOverlay.classList.toggle('hidden');
        }

        if (openSidebar) openSidebar.addEventListener('click', toggleSidebar);
        if (closeSidebar) closeSidebar.addEventListener('click', toggleSidebar);
        if (sidebarOverlay) sidebarOverlay.addEventListener('click', toggleSidebar);

        function updateTime() {
            const now = new Date();
            const options = { day: '2-digit', month: '2-digit', year: 'numeric' };
            document.getElementById('currentTime').textContent = now.toLocaleDateString('th-TH', options);
        }
        updateTime();

        async function loadSettings() {
            try {
                // Load Branches
                const branchResponse = await apiFetch('/api/branches');
                const branches = await branchResponse.json();
                const branchGrid = document.getElementById('branchGrid');
                
                if (branches.length === 0) {
                    branchGrid.innerHTML = '<div class="p-10 text-center text-slate-400 col-span-full font-medium">ไม่พบข้อมูลสาขา</div>';
                } else {
                    branchGrid.innerHTML = branches.map(branch => `
                        <div class="bg-white border border-slate-200 rounded-2xl p-5 hover:border-indigo-500/50 hover:shadow-lg hover:shadow-indigo-500/5 transition-all cursor-pointer group">
                            <div class="flex items-center gap-4 mb-3">
                                <div class="w-10 h-10 bg-white rounded-xl shadow-sm border border-slate-200 flex items-center justify-center text-indigo-600 group-hover:bg-indigo-600 group-hover:text-white transition-all">
                                    <i data-lucide="building-2" class="w-5 h-5"></i>
                                </div>
                                <h3 class="font-bold text-slate-700 tracking-tight">${escapeHTML(branch.name)}</h3>
                            </div>
                            <p class="text-xs text-slate-400 font-medium leading-relaxed truncate">${escapeHTML(branch.address || 'ไม่มีข้อมูลที่อยู่')}</p>
                        </div>
                    `).join('');
                }

                // Load Departments
                const deptResponse = await apiFetch('/api/departments');
                const depts = await deptResponse.json();
                const deptGrid = document.getElementById('deptGrid');
                
                if (depts.length === 0) {
                    deptGrid.innerHTML = '<div class="p-10 text-center text-slate-400 col-span-full font-medium">ไม่พบข้อมูลแผนก</div>';
                } else {
                    deptGrid.innerHTML = depts.map(dept => `
                        <div class="bg-white border border-slate-200 rounded-2xl p-5 hover:border-indigo-500/50 hover:shadow-lg hover:shadow-indigo-500/5 transition-all cursor-pointer text-center">
                            <div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-400 mx-auto mb-3">
                                <i data-lucide="briefcase" class="w-6 h-6"></i>
                            </div>
                            <h3 class="font-bold text-slate-700 text-sm mb-1">${escapeHTML(dept.name)}</h3>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">${escapeHTML(dept.branch_name || '-')}</p>
                        </div>
                    `).join('');
                }
                lucide.createIcons();
            } catch (error) {
                console.error(error);
            }
        }

        document.addEventListener('DOMContentLoaded', loadSettings);
    </script>
</body>
</html>

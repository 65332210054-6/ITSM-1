<!DOCTYPE html>
<html lang="th" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | ITSM Admin</title>
    <script>
        if (localStorage.getItem('token')) {
            window.location.replace('/');
        }
    </script>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.454.0/lucide.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body class="h-full flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-indigo-600 shadow-xl shadow-indigo-600/20 mb-8">
            <i data-lucide="shield-check" class="w-10 h-10 text-white"></i>
        </div>
        <h2 class="text-3xl font-bold tracking-tight text-slate-900">Enterprise ITSM</h2>
        <p class="mt-2 text-sm text-slate-600">ระบบบริหารจัดการงานบริการและทรัพย์สินไอที</p>
    </div>

    <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-[400px]">
        <div class="bg-white py-10 px-8 shadow-xl shadow-slate-200/50 sm:rounded-3xl border border-slate-100">
            <form id="loginForm" class="space-y-6">
                <div>
                    <label for="email" class="block text-sm font-semibold text-slate-700 mb-2">ชื่อผู้ใช้งาน หรืออีเมลพนักงาน</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                            <i data-lucide="user" class="h-5 w-5"></i>
                        </div>
                        <input id="email" name="email" type="text" autocomplete="username" required 
                            class="block w-full pl-12 pr-4 rounded-2xl border-0 py-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-200 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm transition-all outline-none"
                            placeholder="admin หรือ name@company.com" value="visitor@example.com">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">รหัสผ่าน</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                            <i data-lucide="lock" class="h-5 w-5"></i>
                        </div>
                        <input id="password" name="password" type="password" autocomplete="current-password" required 
                            class="block w-full pl-12 pr-12 rounded-2xl border-0 py-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-200 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm transition-all outline-none"
                            placeholder="••••••••" value="123456">
                        <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-indigo-600 transition-colors">
                            <i data-lucide="eye" id="eyeIcon" class="h-5 w-5"></i>
                        </button>
                    </div>
                </div>

                <div id="errorMessage" class="hidden p-4 rounded-2xl bg-red-50 text-red-600 text-xs font-semibold border border-red-100 flex items-center gap-2">
                    <i data-lucide="alert-circle" class="w-4 h-4"></i>
                    <span id="errorText"></span>
                </div>

                <button type="submit" id="submitBtn" class="w-full btn-primary py-3.5 text-sm">
                    เข้าสู่ระบบ
                </button>
            </form>
        </div>

        <p class="mt-10 text-center text-xs text-slate-400 font-medium">
            &copy; 2026 IT Management System. All rights reserved. <br>
            <a href="/welcome.html" class="inline-block mt-2 text-indigo-500 hover:text-indigo-400 underline underline-offset-4">ทำความรู้จักระบบเพิ่มเติม</a>
        </p>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/assets/js/app.js"></script>
    <script>
        lucide.createIcons();

        // Password Toggle Logic
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Toggle Icon
            if (type === 'text') {
                eyeIcon.setAttribute('data-lucide', 'eye-off');
            } else {
                eyeIcon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        });

        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const submitBtn = document.getElementById('submitBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin mr-2"></i> กำลังตรวจสอบ...';
            lucide.createIcons();

            const formData = new FormData(loginForm);
            const data = Object.fromEntries(formData);

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    localStorage.setItem('user', JSON.stringify(result.user));
                    localStorage.setItem('token', result.token);
                    localStorage.removeItem('system_settings');
                    localStorage.removeItem('system_settings_time');
                    window.location.href = '/';
                } else {
                    let message = result.message || 'อีเมลหรือรหัสผ่านไม่ถูกต้อง';
                    if (message.includes('DATABASE_URL')) {
                        message = '❌ ระบบยังไม่ได้เชื่อมต่อฐานข้อมูล กรุณาตั้งค่า DATABASE_URL ใน Cloudflare Dashboard';
                    }
                    errorText.innerText = message;
                    errorMessage.classList.remove('hidden');
                }
            } catch (err) {
                notify.error('เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'เข้าสู่ระบบ';
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>

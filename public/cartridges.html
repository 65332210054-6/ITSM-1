<!DOCTYPE html>
<html lang="th" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หมึกพิมพ์ & Toner | ITSM Admin</title>
    <script>
        if (!localStorage.getItem('token')) {
            window.location.replace('/login.html');
        }
    </script>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.454.0/lucide.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body class="h-full flex overflow-hidden">
    <div id="sidebarOverlay" class="fixed inset-0 bg-slate-900/50 z-40 hidden transition-opacity lg:hidden"></div>
    <div id="sidebar-container" class="lg:static"></div>

    <div class="flex-1 flex flex-col overflow-hidden">
        <div id="header-container"></div>

        <main class="flex-1 overflow-x-hidden overflow-y-auto p-4 sm:p-10 bg-slate-50/50">
            <div class="max-w-7xl mx-auto space-y-6 sm:space-y-10">
                <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
                    <div class="relative w-full md:w-96">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                            <i data-lucide="search" class="w-5 h-5"></i>
                        </div>
                        <input type="text" id="cartridgeSearch" placeholder="ค้นหารุ่นหมึกพิมพ์, เครื่องพิมพ์..." 
                            class="block w-full pl-12 pr-4 py-3 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-600 outline-none transition-all shadow-sm bg-white">
                    </div>
                    <button onclick="openCartridgeModal()" class="w-full md:w-auto btn-primary">
                        <i data-lucide="plus-circle" class="w-5 h-5"></i> เพิ่มหมึกพิมพ์ใหม่
                    </button>
                </div>

                <div class="card">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[900px]">
                            <thead>
                                <tr class="bg-slate-50 border-b border-slate-200">
                                    <th class="th-cell">รุ่นตลับหมึก / ประเภท</th>
                                    <th class="th-cell text-center">สี</th>
                                    <th class="th-cell text-center">คงเหลือ / Min</th>
                                    <th class="th-cell">เครื่องพิมพ์ที่รองรับ</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="cartridgeTableBody" class="divide-y divide-slate-100">
                                <tr><td colspan="5" class="px-6 py-10 text-center text-slate-400">กำลังโหลดข้อมูล...</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="pagination-footer" id="pagination"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Cartridge Modal -->
    <div id="cartridgeModal" class="modal-overlay hidden">
        <div class="modal-content max-w-lg animate-in fade-in zoom-in duration-200">
            <div class="px-8 py-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/50 rounded-t-3xl">
                <h2 id="modalTitle" class="text-xl font-bold text-slate-800 tracking-tight">จัดการหมึกพิมพ์ / Toner</h2>
                <button onclick="closeCartridgeModal()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <form id="cartridgeForm" class="p-8 space-y-5">
                <input type="hidden" id="cartridgeId">
                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="form-label">รุ่นตลับหมึก *</label>
                        <input type="text" id="model" required placeholder="HP 79A, TK-1178" class="form-input">
                    </div>
                    <div>
                        <label class="form-label">สี</label>
                        <select id="color" class="form-input">
                            <option value="Black">Black (ดำ)</option>
                            <option value="Cyan">Cyan (ฟ้า)</option>
                            <option value="Magenta">Magenta (ชมพู)</option>
                            <option value="Yellow">Yellow (เหลือง)</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="form-label">ประเภท</label>
                        <select id="type" class="form-input">
                            <option value="Original">Original (ของแท้)</option>
                            <option value="Compatible">Compatible (เทียบ)</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">ราคาประมาณการ (฿)</label>
                        <input type="number" id="price" placeholder="0" class="form-input">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="form-label text-indigo-600 font-bold">จำนวนคงเหลือ</label>
                        <input type="number" id="quantity" required placeholder="0" class="form-input border-indigo-100 bg-indigo-50/20">
                    </div>
                    <div>
                        <label class="form-label">แจ้งเตือนขั้นต่ำ (Min)</label>
                        <input type="number" id="min_stock" required placeholder="2" class="form-input">
                    </div>
                </div>
                <div>
                    <label class="form-label">เครื่องพิมพ์ที่รองรับ</label>
                    <textarea id="printer_models" rows="3" placeholder="ระบุรุ่นเครื่องพิมพ์ที่สามารถใช้ตลับหมึกนี้ได้..." class="form-input h-24 py-3"></textarea>
                </div>
                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="closeCartridgeModal()" class="flex-1 px-6 py-3 rounded-2xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-all">ยกเลิก</button>
                    <button type="submit" class="flex-1 bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg shadow-indigo-600/20 hover:bg-indigo-500 transition-all flex items-center justify-center gap-2">
                        <i data-lucide="save" class="w-5 h-5"></i> บันทึกข้อมูล
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/assets/js/app.js"></script>
    <script>
        let allCartridges = [];
        let currentPage = 1;
        let itemsPerPage = 10;
        let totalCount = 0;
        let searchTimer = null;

        async function loadCartridges() {
            ui.renderTableLoading('cartridgeTableBody', 5);
            const search = document.getElementById('cartridgeSearch').value;
            const params = new URLSearchParams({ page: currentPage, limit: itemsPerPage, search });

            try {
                const res = await apiFetch(`/api/cartridges?${params.toString()}`);
                const data = await res.json();
                allCartridges = data.cartridges;
                totalCount = data.totalCount;
                renderCartridges();
                renderPagination();
            } catch (err) {
                document.getElementById('cartridgeTableBody').innerHTML = `<tr><td colspan="5" class="px-6 py-10 text-center text-red-500 font-bold">Error: ${err.message}</td></tr>`;
            }
        }

        function renderCartridges() {
            const tbody = document.getElementById('cartridgeTableBody');
            if (allCartridges.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-10 text-center text-slate-400">ไม่พบข้อมูลหมึกพิมพ์</td></tr>';
                return;
            }

            tbody.innerHTML = allCartridges.map(c => {
                const isLowStock = c.quantity <= c.min_stock;
                const colorMap = {
                    'Black': 'bg-slate-900 text-white',
                    'Cyan': 'bg-cyan-500 text-white',
                    'Magenta': 'bg-pink-500 text-white',
                    'Yellow': 'bg-yellow-400 text-slate-900'
                };

                return `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-4">
                            <div class="font-bold text-slate-800 text-sm">${escapeHTML(c.model)}</div>
                            <div class="text-[10px] text-slate-400 font-medium uppercase tracking-tight">${escapeHTML(c.type)}</div>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <span class="px-3 py-1 ${colorMap[c.color] || 'bg-slate-100'} rounded-lg text-[10px] font-bold uppercase tracking-wider">${c.color}</span>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <div class="text-sm font-bold ${isLowStock ? 'text-red-600 animate-pulse' : 'text-slate-700'}">${c.quantity}</div>
                            <div class="text-[10px] text-slate-400">Min: ${c.min_stock}</div>
                        </td>
                        <td class="px-6 py-4">
                            <div class="text-[11px] text-slate-600 line-clamp-2 max-w-xs">${escapeHTML(c.printer_models || '-')}</div>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <div class="flex justify-end gap-1">
                                <button onclick="editCartridge('${c.id}')" class="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition-all active:scale-95">
                                    <i data-lucide="edit-3" class="w-4 h-4"></i>
                                </button>
                                <button onclick="deleteCartridge('${c.id}', '${escapeHTML(c.model)}')" class="p-2 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-xl transition-all active:scale-95">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
            lucide.createIcons();
        }

        function renderPagination() {
            const container = document.getElementById('pagination');
            const totalPages = Math.ceil(totalCount / itemsPerPage);
            container.innerHTML = `
                <div class="text-xs font-bold text-slate-500 uppercase tracking-wider">ทั้งหมด ${totalCount} รายการ</div>
                <div class="flex items-center gap-2">
                    <button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''} class="pagination-btn-nav"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                    <div class="flex items-center gap-1">${Array.from({length: Math.min(5, totalPages)}, (_, i) => `<button onclick="changePage(${i+1})" class="pagination-btn ${i+1 === currentPage ? 'pagination-btn-active' : 'pagination-btn-inactive'}">${i+1}</button>`).join('')}</div>
                    <button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''} class="pagination-btn-nav"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
                </div>
            `;
            lucide.createIcons();
        }

        function changePage(p) { currentPage = p; loadCartridges(); }

        function openCartridgeModal() {
            document.getElementById('modalTitle').innerText = 'เพิ่มหมึกพิมพ์ใหม่';
            document.getElementById('cartridgeId').value = '';
            document.getElementById('cartridgeForm').reset();
            document.getElementById('cartridgeModal').classList.remove('hidden');
        }

        function closeCartridgeModal() { document.getElementById('cartridgeModal').classList.add('hidden'); }

        function editCartridge(id) {
            const c = allCartridges.find(x => x.id === id);
            if (!c) return;
            document.getElementById('modalTitle').innerText = 'แก้ไขข้อมูลหมึกพิมพ์';
            document.getElementById('cartridgeId').value = c.id;
            document.getElementById('model').value = c.model;
            document.getElementById('color').value = c.color;
            document.getElementById('type').value = c.type;
            document.getElementById('price').value = c.price;
            document.getElementById('quantity').value = c.quantity;
            document.getElementById('min_stock').value = c.min_stock;
            document.getElementById('printer_models').value = c.printer_models || '';
            document.getElementById('cartridgeModal').classList.remove('hidden');
        }

        async function deleteCartridge(id, name) {
            if (await notify.confirm('ลบข้อมูล', `ต้องการลบหมึกพิมพ์รุ่น "${name}" ใช่หรือไม่?`)) {
                try {
                    const res = await apiFetch(`/api/cartridges?action=delete&id=${id}`, { method: 'POST' });
                    if (res.ok) { notify.success('ลบข้อมูลสำเร็จ'); loadCartridges(); }
                } catch (err) { notify.error('เกิดข้อผิดพลาด'); }
            }
        }

        document.getElementById('cartridgeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('cartridgeId').value;
            const data = {
                id: id || null,
                model: document.getElementById('model').value,
                color: document.getElementById('color').value,
                type: document.getElementById('type').value,
                price: parseFloat(document.getElementById('price').value) || 0,
                quantity: parseInt(document.getElementById('quantity').value) || 0,
                min_stock: parseInt(document.getElementById('min_stock').value) || 0,
                printer_models: document.getElementById('printer_models').value
            };
            try {
                const res = await apiFetch('/api/cartridges', { method: 'POST', body: JSON.stringify(data) });
                if (res.ok) { notify.success('บันทึกสำเร็จ'); closeCartridgeModal(); loadCartridges(); }
            } catch (err) { notify.error('เกิดข้อผิดพลาด'); }
        });

        document.getElementById('cartridgeSearch').addEventListener('input', () => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => { currentPage = 1; loadCartridges(); }, 500);
        });

        document.addEventListener('DOMContentLoaded', () => {
            ui.renderHeader('หมึกพิมพ์ & Toner');
            ui.renderSidebar('sidebar-container');
            loadCartridges();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หมวดหมู่ทรัพย์สิน | ITSM Admin</title>
    <script>
        if (!localStorage.getItem('token')) {
            window.location.replace('/login.html');
        }
    </script>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.454.0/lucide.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body class="h-full flex overflow-hidden">
    <div id="sidebarOverlay" class="fixed inset-0 bg-slate-900/50 z-40 hidden transition-opacity lg:hidden"></div>
    <div id="sidebar-container" class="lg:static"></div>

    <div class="flex-1 flex flex-col overflow-hidden">
        <div id="header-container"></div>

        <main class="flex-1 overflow-x-hidden overflow-y-auto p-4 sm:p-10 bg-slate-50/50">
            <div class="max-w-5xl mx-auto space-y-6 sm:space-y-8">

                <!-- Page Header -->
                <div class="flex flex-col md:flex-row gap-4 items-center justify-end">
                    <button onclick="openCategoryModal()" class="w-full md:w-auto btn-primary">
                        <i data-lucide="plus-circle" class="w-5 h-5"></i> เพิ่มหมวดหมู่ใหม่
                    </button>
                </div>

                <!-- Stats Banner -->
                <div id="statsBanner" class="bg-white rounded-2xl border border-slate-200 p-5 flex items-center gap-4 shadow-sm">
                    <div class="w-12 h-12 bg-indigo-50 rounded-xl flex items-center justify-center text-indigo-600">
                        <i data-lucide="layers" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <p class="text-2xl font-bold text-slate-800" id="totalCategories">-</p>
                        <p class="text-sm text-slate-400 font-medium">หมวดหมู่ทั้งหมด</p>
                    </div>
                </div>

                <!-- Categories Grid -->
                <div id="categoryGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4">
                    <!-- Skeleton loading -->
                    <div class="col-span-full flex justify-center py-16">
                        <div class="flex flex-col items-center gap-3 text-slate-400">
                            <div class="w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                            <p class="font-medium text-sm">กำลังโหลดหมวดหมู่...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Category Modal -->
    <div id="categoryModal" class="modal-overlay hidden">
        <div class="modal-content max-w-md animate-in fade-in zoom-in duration-200">
            <div class="px-8 py-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/50 rounded-t-3xl">
                <h2 id="catModalTitle" class="text-xl font-bold text-slate-800 tracking-tight">เพิ่มหมวดหมู่ใหม่</h2>
                <button onclick="closeCategoryModal()" class="btn-icon"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <form id="categoryForm" class="p-8 space-y-5">
                <input type="hidden" id="catId">
                <div>
                    <label class="form-label">ชื่อหมวดหมู่ <span class="text-red-500">*</span></label>
                    <input type="text" id="catName" required class="form-input" placeholder="เช่น Laptop, Printer, Server">
                </div>
                <div>
                    <label class="form-label">ไอคอน (Lucide name)</label>
                    <input type="text" id="catIcon" class="form-input" placeholder="เช่น laptop, monitor, printer">
                    <p class="text-xs text-slate-400 mt-1">ดูชื่อไอคอนได้ที่ <a href="https://lucide.dev/icons" target="_blank" class="text-indigo-500 underline">lucide.dev/icons</a></p>
                </div>
                <div>
                    <label class="form-label">สีธีม</label>
                    <div class="grid grid-cols-5 gap-2" id="colorPicker">
                        <!-- Colors rendered by JS -->
                    </div>
                    <input type="hidden" id="catColor" value="slate">
                </div>
                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="closeCategoryModal()" class="flex-1 btn-secondary">ยกเลิก</button>
                    <button type="submit" class="flex-1 btn-primary">
                        <i data-lucide="save" class="w-5 h-5"></i> บันทึก
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/assets/js/app.js"></script>
    <script>
        const COLORS = [
            { name: 'slate', bg: 'bg-slate-500', label: 'Slate' },
            { name: 'blue', bg: 'bg-blue-500', label: 'Blue' },
            { name: 'indigo', bg: 'bg-indigo-500', label: 'Indigo' },
            { name: 'violet', bg: 'bg-violet-500', label: 'Violet' },
            { name: 'green', bg: 'bg-green-500', label: 'Green' },
            { name: 'amber', bg: 'bg-amber-500', label: 'Amber' },
            { name: 'red', bg: 'bg-red-500', label: 'Red' },
            { name: 'cyan', bg: 'bg-cyan-500', label: 'Cyan' },
            { name: 'pink', bg: 'bg-pink-500', label: 'Pink' },
            { name: 'orange', bg: 'bg-orange-500', label: 'Orange' },
        ];

        const COLOR_MAP = {
            slate: { bg: 'bg-slate-100', text: 'text-slate-600', icon: 'bg-slate-500' },
            blue: { bg: 'bg-blue-50', text: 'text-blue-600', icon: 'bg-blue-500' },
            indigo: { bg: 'bg-indigo-50', text: 'text-indigo-600', icon: 'bg-indigo-500' },
            violet: { bg: 'bg-violet-50', text: 'text-violet-600', icon: 'bg-violet-500' },
            green: { bg: 'bg-green-50', text: 'text-green-600', icon: 'bg-green-500' },
            amber: { bg: 'bg-amber-50', text: 'text-amber-600', icon: 'bg-amber-500' },
            red: { bg: 'bg-red-50', text: 'text-red-600', icon: 'bg-red-500' },
            cyan: { bg: 'bg-cyan-50', text: 'text-cyan-600', icon: 'bg-cyan-500' },
            pink: { bg: 'bg-pink-50', text: 'text-pink-600', icon: 'bg-pink-500' },
            orange: { bg: 'bg-orange-50', text: 'text-orange-600', icon: 'bg-orange-500' },
        };

        let allCategories = [];
        let selectedColor = 'slate';

        function initColorPicker() {
            const container = document.getElementById('colorPicker');
            container.innerHTML = COLORS.map(c => `
                <button type="button" onclick="selectColor('${c.name}')" id="color-btn-${c.name}"
                    class="w-10 h-10 rounded-xl ${c.bg} hover:scale-110 transition-all ring-2 ring-transparent hover:ring-offset-2 hover:ring-${c.name}-400 flex items-center justify-center" title="${c.label}">
                </button>
            `).join('');
            selectColor('slate');
        }

        function selectColor(name) {
            selectedColor = name;
            document.getElementById('catColor').value = name;
            COLORS.forEach(c => {
                const btn = document.getElementById(`color-btn-${c.name}`);
                if (btn) {
                    btn.innerHTML = c.name === name ? '<i data-lucide="check" class="w-4 h-4 text-white"></i>' : '';
                    btn.classList.toggle('ring-offset-2', c.name === name);
                }
            });
            lucide.createIcons();
        }

        async function loadCategories() {
            try {
                const res = await apiFetch('/api/categories');
                if (!res || !res.ok) throw new Error('API Error');
                allCategories = await res.json();
                document.getElementById('totalCategories').textContent = allCategories.length;
                renderCategories();
            } catch (err) {
                document.getElementById('categoryGrid').innerHTML = `<div class="col-span-full py-10 text-center text-red-500 font-medium">ไม่สามารถโหลดข้อมูลได้</div>`;
            }
        }

        function renderCategories() {
            const grid = document.getElementById('categoryGrid');
            if (allCategories.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-16 text-center text-slate-400 font-medium">ยังไม่มีหมวดหมู่ในระบบ</div>`;
                return;
            }
            grid.innerHTML = allCategories.map(cat => {
                const colors = COLOR_MAP[cat.color] || COLOR_MAP['slate'];
                const canEdit = ui.checkAccess('categories', null, null, 'edit');
                const canDelete = ui.checkAccess('categories', null, null, 'delete');

                return `
                    <div class="bg-white border border-slate-200 rounded-2xl p-5 hover:border-indigo-500/40 hover:shadow-lg hover:shadow-indigo-500/5 transition-all relative group cursor-pointer active:scale-95"
                         onclick="${canEdit ? `editCategory('${cat.id}')` : ''}">
                        <div class="absolute top-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition-all">
                            ${canDelete ? `
                            <button onclick="confirmDeleteCategory(event, '${cat.id}', '${escapeHTML(cat.name)}')"
                                class="btn-icon btn-icon-rose" title="ลบ">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>` : ''}
                        </div>
                        <div class="w-12 h-12 ${colors.icon} rounded-xl flex items-center justify-center text-white mb-4 group-hover:scale-110 transition-transform shadow-lg">
                            <i data-lucide="${cat.icon || 'box'}" class="w-6 h-6"></i>
                        </div>
                        <h3 class="font-bold text-slate-800 text-sm">${escapeHTML(cat.name)}</h3>
                        <p class="text-[10px] text-slate-400 font-medium mt-1 uppercase tracking-wider">${cat.icon || 'box'}</p>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        function openCategoryModal() {
            document.getElementById('catModalTitle').textContent = 'เพิ่มหมวดหมู่ใหม่';
            document.getElementById('categoryForm').reset();
            document.getElementById('catId').value = '';
            initColorPicker();
            document.getElementById('categoryModal').classList.remove('hidden');
        }

        function closeCategoryModal() {
            document.getElementById('categoryModal').classList.add('hidden');
        }

        function editCategory(id) {
            const cat = allCategories.find(c => c.id === id);
            if (!cat) return;
            document.getElementById('catModalTitle').textContent = 'แก้ไขหมวดหมู่';
            document.getElementById('catId').value = cat.id;
            document.getElementById('catName').value = cat.name;
            document.getElementById('catIcon').value = cat.icon || '';
            initColorPicker();
            selectColor(cat.color || 'slate');
            document.getElementById('categoryModal').classList.remove('hidden');
        }

        async function confirmDeleteCategory(e, id, name) {
            e.stopPropagation();
            const confirmed = await notify.confirm('ลบหมวดหมู่', `ยืนยันการลบหมวดหมู่ "${name}"?`);
            if (!confirmed) return;

            try {
                const res = await apiFetch(`/api/categories?action=delete&id=${id}`, { method: 'POST' });
                if (res && res.ok) {
                    notify.success('ลบหมวดหมู่สำเร็จ');
                    loadCategories();
                } else {
                    const err = await res.json().catch(() => ({}));
                    notify.error(err.message || 'ไม่สามารถลบได้');
                }
            } catch (err) {
                notify.error('เกิดข้อผิดพลาดในการเชื่อมต่อ');
            }
        }

        document.getElementById('categoryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('catId').value;
            const name = document.getElementById('catName').value.trim();
            const icon = document.getElementById('catIcon').value.trim() || 'box';
            const color = document.getElementById('catColor').value || 'slate';

            try {
                const res = await apiFetch('/api/categories', {
                    method: 'POST',
                    body: JSON.stringify({ id: id || null, name, icon, color })
                });
                if (res && res.ok) {
                    notify.success(id ? 'แก้ไขสำเร็จ' : 'เพิ่มหมวดหมู่สำเร็จ');
                    closeCategoryModal();
                    loadCategories();
                } else {
                    const err = await res.json().catch(() => ({}));
                    notify.error(err.message || 'เกิดข้อผิดพลาด');
                }
            } catch (err) {
                notify.error('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้');
            }
        });

        document.addEventListener('DOMContentLoaded', async () => {
            const settings = await ui.getSystemSettings();
            if (!ui.checkAccess('categories', settings, null, 'view')) {
                window.location.replace('/index.html');
                return;
            }

            if (!ui.checkAccess('categories', settings, null, 'create')) {
                const addBtn = document.querySelector('button[onclick="openCategoryModal()"]');
                if (addBtn) addBtn.remove();
            }

            ui.renderHeader('หมวดหมู่ทรัพย์สิน');
            ui.renderSidebar('sidebar-container');
            initColorPicker();
            loadCategories();
        });
    </script>
</body>
</html>

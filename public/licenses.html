<!DOCTYPE html>
<html lang="th" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลิขสิทธิ์ซอฟต์แวร์ | ITSM Admin</title>
    <script>
        if (!localStorage.getItem('token')) {
            window.location.replace('/login.html');
        }
    </script>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.454.0/lucide.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body class="h-full flex overflow-hidden">
    <div id="sidebarOverlay" class="fixed inset-0 bg-slate-900/50 z-40 hidden transition-opacity lg:hidden"></div>
    <div id="sidebar-container" class="lg:static"></div>

    <div class="flex-1 flex flex-col overflow-hidden">
        <div id="header-container"></div>

        <main class="flex-1 overflow-x-hidden overflow-y-auto p-4 sm:p-10 bg-slate-50/50">
            <div class="max-w-7xl mx-auto space-y-6 sm:space-y-10">
                <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
                    <div class="relative w-full md:w-96">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                            <i data-lucide="search" class="w-5 h-5"></i>
                        </div>
                        <input type="text" id="licenseSearch" placeholder="ค้นหาซอฟต์แวร์, Vendor..." 
                            class="block w-full pl-12 pr-4 py-3 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-600 outline-none transition-all shadow-sm bg-white">
                    </div>
                    <button onclick="openLicenseModal()" class="w-full md:w-auto btn-primary">
                        <i data-lucide="plus-circle" class="w-5 h-5"></i> ลงทะเบียนซอฟต์แวร์ใหม่
                    </button>
                </div>

                <div class="card">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[1000px]">
                            <thead>
                                <tr class="bg-slate-50 border-b border-slate-200">
                                    <th class="th-cell">ชื่อโปรแกรม / เวอร์ชัน</th>
                                    <th class="th-cell">License Key</th>
                                    <th class="th-cell text-center">ประเภท / จำนวน</th>
                                    <th class="th-cell">Vendor</th>
                                    <th class="th-cell text-center">วันหมดอายุ</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="licenseTableBody" class="divide-y divide-slate-100">
                                <tr><td colspan="6" class="px-6 py-10 text-center text-slate-400">กำลังโหลดข้อมูล...</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="pagination-footer" id="pagination"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- License Modal -->
    <div id="licenseModal" class="modal-overlay hidden">
        <div class="modal-content max-w-xl animate-in fade-in zoom-in duration-200">
            <div class="px-8 py-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/50 rounded-t-3xl">
                <h2 id="modalTitle" class="text-xl font-bold text-slate-800 tracking-tight">ลงทะเบียน Software License</h2>
                <button onclick="closeLicenseModal()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <form id="licenseForm" class="p-8 space-y-4 max-h-[75vh] overflow-y-auto">
                <input type="hidden" id="licenseId">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="form-label">ชื่อโปรแกรม *</label>
                        <input type="text" id="name" required placeholder="เช่น Office 2021, AutoCAD" class="form-input">
                    </div>
                    <div>
                        <label class="form-label">เวอร์ชัน</label>
                        <input type="text" id="version" placeholder="Pro, Standard, 2024" class="form-input">
                    </div>
                </div>
                <div>
                    <label class="form-label">License Key</label>
                    <input type="text" id="license_key" placeholder="XXXXX-XXXXX-XXXXX-XXXXX" class="form-input">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="form-label">ประเภทลิขสิทธิ์</label>
                        <select id="type" class="form-input">
                            <option value="Perpetual">ซื้อขาด (Perpetual)</option>
                            <option value="Subscription">รายปี/เดือน (Subscription)</option>
                            <option value="Open Source">ฟรี / Open Source</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">จำนวนสิทธิ์ที่มี</label>
                        <input type="number" id="total_licenses" defaultValue="1" class="form-input">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="form-label">วันที่ซื้อ</label>
                        <input type="date" id="purchase_date" class="form-input">
                    </div>
                    <div>
                        <label class="form-label text-amber-600">วันหมดอายุ (ถ้ามี)</label>
                        <input type="date" id="expiration_date" class="form-input border-amber-100 bg-amber-50/20">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="form-label">ผู้จำหน่าย (Vendor)</label>
                        <input type="text" id="vendor" placeholder="IT City, Microsoft Store" class="form-input">
                    </div>
                    <div>
                        <label class="form-label">ราคา (฿)</label>
                        <input type="number" id="price" placeholder="0" class="form-input">
                    </div>
                </div>
                <div>
                    <label class="form-label">หมายเหตุ</label>
                    <textarea id="notes" rows="2" class="form-input h-20 py-2"></textarea>
                </div>
                <div class="pt-6 flex gap-3">
                    <button type="button" onclick="closeLicenseModal()" class="flex-1 px-6 py-3 rounded-2xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-all">ยกเลิก</button>
                    <button type="submit" class="flex-1 bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg shadow-indigo-600/20 hover:bg-indigo-500 transition-all flex items-center justify-center gap-2">
                        <i data-lucide="save" class="w-5 h-5"></i> บันทึกข้อมูล
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/assets/js/app.js"></script>
    <script>
        let allLicenses = [];
        let currentPage = 1;
        let itemsPerPage = 10;
        let totalCount = 0;
        let searchTimer = null;

        async function loadLicenses() {
            ui.renderTableLoading('licenseTableBody', 6);
            const search = document.getElementById('licenseSearch').value;
            const params = new URLSearchParams({ page: currentPage, limit: itemsPerPage, search });

            try {
                const res = await apiFetch(`/api/licenses?${params.toString()}`);
                const data = await res.json();
                allLicenses = data.licenses;
                totalCount = data.totalCount;
                renderLicenses();
                renderPagination();
            } catch (err) {
                document.getElementById('licenseTableBody').innerHTML = `<tr><td colspan="6" class="px-6 py-10 text-center text-red-500">Error: ${err.message}</td></tr>`;
            }
        }

        function renderLicenses() {
            const tbody = document.getElementById('licenseTableBody');
            if (allLicenses.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-10 text-center text-slate-400">ไม่พบข้อมูลซอฟต์แวร์</td></tr>';
                return;
            }

            tbody.innerHTML = allLicenses.map(l => {
                const isExpiring = l.expiration_date && (new Date(l.expiration_date) - new Date()) / (1000 * 60 * 60 * 24) < 60;
                const isExpired = l.expiration_date && new Date(l.expiration_date) < new Date();
                
                return `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-4">
                            <div class="font-bold text-slate-800 text-sm">${escapeHTML(l.name)}</div>
                            <div class="text-[10px] text-slate-400 font-medium">${escapeHTML(l.version || '-')}</div>
                        </td>
                        <td class="px-6 py-4">
                            <div class="font-mono text-[11px] text-slate-500 bg-slate-100 px-2 py-1 rounded select-all truncate max-w-[150px]" title="${escapeHTML(l.license_key || '-')}">
                                ${l.license_key ? l.license_key.substring(0, 8) + '...' : '-'}
                            </div>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <div class="text-xs font-semibold text-slate-600">${escapeHTML(l.type)}</div>
                            <div class="text-[10px] text-slate-400 font-bold">Qty: ${l.total_licenses}</div>
                        </td>
                        <td class="px-6 py-4">
                            <div class="text-sm text-slate-600">${escapeHTML(l.vendor || '-')}</div>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <div class="text-sm font-bold ${isExpired ? 'text-red-600' : isExpiring ? 'text-amber-600' : 'text-slate-700'}">
                                ${l.expiration_date ? new Date(l.expiration_date).toLocaleDateString('th-TH') : 'ถาวร'}
                            </div>
                            ${isExpired ? '<span class="text-[9px] font-bold text-red-500 uppercase">Expired</span>' : ''}
                        </td>
                        <td class="px-6 py-4 text-right">
                            <div class="flex justify-end gap-1">
                                <button onclick="editLicense('${l.id}')" class="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition-all active:scale-95">
                                    <i data-lucide="edit-3" class="w-4 h-4"></i>
                                </button>
                                <button onclick="deleteLicense('${l.id}', '${escapeHTML(l.name)}')" class="p-2 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-xl transition-all active:scale-95">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
            lucide.createIcons();
        }

        function renderPagination() {
            const container = document.getElementById('pagination');
            const totalPages = Math.ceil(totalCount / itemsPerPage);
            container.innerHTML = `
                <div class="text-xs font-bold text-slate-500 uppercase tracking-wider">ทั้งหมด ${totalCount} รายการ</div>
                <div class="flex items-center gap-2">
                    <button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''} class="pagination-btn-nav"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                    <div class="flex items-center gap-1">${Array.from({length: Math.min(5, totalPages)}, (_, i) => `<button onclick="changePage(${i+1})" class="pagination-btn ${i+1 === currentPage ? 'pagination-btn-active' : 'pagination-btn-inactive'}">${i+1}</button>`).join('')}</div>
                    <button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''} class="pagination-btn-nav"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
                </div>
            `;
            lucide.createIcons();
        }

        function changePage(p) { currentPage = p; loadLicenses(); }

        function openLicenseModal() {
            document.getElementById('modalTitle').innerText = 'ลงทะเบียนซอฟต์แวร์ใหม่';
            document.getElementById('licenseId').value = '';
            document.getElementById('licenseForm').reset();
            document.getElementById('licenseModal').classList.remove('hidden');
        }

        function closeLicenseModal() { document.getElementById('licenseModal').classList.add('hidden'); }

        function editLicense(id) {
            const l = allLicenses.find(x => x.id === id);
            if (!l) return;
            document.getElementById('modalTitle').innerText = 'แก้ไขข้อมูลไลเซนส์';
            document.getElementById('licenseId').value = l.id;
            document.getElementById('name').value = l.name;
            document.getElementById('version').value = l.version || '';
            document.getElementById('license_key').value = l.license_key || '';
            document.getElementById('type').value = l.type;
            document.getElementById('total_licenses').value = l.total_licenses;
            document.getElementById('purchase_date').value = l.purchase_date ? l.purchase_date.split('T')[0] : '';
            document.getElementById('expiration_date').value = l.expiration_date ? l.expiration_date.split('T')[0] : '';
            document.getElementById('vendor').value = l.vendor || '';
            document.getElementById('price').value = l.price;
            document.getElementById('notes').value = l.notes || '';
            document.getElementById('licenseModal').classList.remove('hidden');
        }

        async function deleteLicense(id, name) {
            if (await notify.confirm('ลบข้อมูล', `ต้องการลบไลเซนส์ซอฟต์แวร์ "${name}" ใช่หรือไม่?`)) {
                try {
                    const res = await apiFetch(`/api/licenses?action=delete&id=${id}`, { method: 'POST' });
                    if (res.ok) { notify.success('ลบข้อมูลสำเร็จ'); loadLicenses(); }
                } catch (err) { notify.error('เกิดข้อผิดพลาด'); }
            }
        }

        document.getElementById('licenseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('licenseId').value;
            const data = {
                id: id || null,
                name: document.getElementById('name').value,
                version: document.getElementById('version').value,
                license_key: document.getElementById('license_key').value,
                type: document.getElementById('type').value,
                total_licenses: parseInt(document.getElementById('total_licenses').value) || 1,
                purchase_date: document.getElementById('purchase_date').value || null,
                expiration_date: document.getElementById('expiration_date').value || null,
                vendor: document.getElementById('vendor').value,
                price: parseFloat(document.getElementById('price').value) || 0,
                notes: document.getElementById('notes').value
            };
            try {
                const res = await apiFetch('/api/licenses', { method: 'POST', body: JSON.stringify(data) });
                if (res.ok) { notify.success('บันทึกสำเร็จ'); closeLicenseModal(); loadLicenses(); }
            } catch (err) { notify.error('เกิดข้อผิดพลาด'); }
        });

        document.getElementById('licenseSearch').addEventListener('input', () => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => { currentPage = 1; loadLicenses(); }, 500);
        });

        document.addEventListener('DOMContentLoaded', () => {
            ui.renderHeader('ลิขสิทธิ์ซอฟต์แวร์');
            ui.renderSidebar('sidebar-container');
            loadLicenses();
        });
    </script>
</body>
</html>

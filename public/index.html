<!DOCTYPE html>
<html lang="th" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แดชบอร์ด | ITSM Admin</title>
    <script>
        if (!localStorage.getItem('token')) {
            window.location.replace('/login.html');
        }
    </script>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.454.0/lucide.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="h-full flex overflow-hidden">
    <!-- Mobile Sidebar Overlay -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-slate-900/50 z-40 hidden transition-opacity lg:hidden"></div>

    <!-- Sidebar Container (Client-side rendered) -->
    <div id="sidebar-container" class="lg:static"></div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <!-- Header Container (Client-side rendered) -->
        <div id="header-container"></div>

        <!-- Main Area -->
        <main id="app" class="flex-1 overflow-x-hidden overflow-y-auto p-4 sm:p-10 bg-slate-50/50">
            <div class="max-w-6xl mx-auto space-y-6 sm:space-y-10">
                <!-- Welcome Card -->
                <div class="bg-gradient-to-br from-indigo-600 to-blue-500 rounded-2xl sm:rounded-3xl shadow-2xl shadow-indigo-600/20 p-6 sm:p-12 text-white relative overflow-hidden">
                    <div class="relative z-10 mb-8 sm:mb-12">
                        <h2 class="text-2xl sm:text-4xl font-extrabold tracking-tight">ยินดีต้อนรับเข้าสู่ระบบ</h2>
                        <p class="text-indigo-100 mt-2 sm:mt-4 text-sm sm:text-lg font-medium opacity-90">สวัสดีคุณ <span id="welcomeName" class="text-white underline underline-offset-4 decoration-indigo-300">...</span></p>
                    </div>

                    <div id="welcomeGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6 relative z-10">
                        <!-- Module cards will be rendered here dynamically -->
                    </div>
                    <!-- Decorative Circle -->
                    <div class="absolute -right-20 -bottom-20 w-40 sm:w-80 h-40 sm:h-80 bg-white/10 rounded-full blur-3xl"></div>
                </div>

                <!-- Simple Stats -->
                <div id="statsGrid" class="grid grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6">
                    <div class="bg-white p-4 sm:p-6 rounded-2xl sm:rounded-3xl shadow-sm border border-slate-100 animate-pulse">
                        <div class="h-10 w-10 bg-slate-100 rounded-xl mb-4"></div>
                        <div class="h-4 w-20 bg-slate-100 rounded mb-2"></div>
                        <div class="h-8 w-12 bg-slate-100 rounded"></div>
                    </div>
                </div>

                <!-- Charts & Activity Section -->
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <!-- Charts (Col Span 2) -->
                    <div class="lg:col-span-2 space-y-6">
                        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                            <div class="flex items-center justify-between mb-6">
                                <h3 class="font-bold text-slate-800">ทรัพย์สินแยกตามประเภท (Asset categories)</h3>
                                <i data-lucide="pie-chart" class="text-slate-400 w-5 h-5"></i>
                            </div>
                            <div class="h-[300px] flex items-center justify-center">
                                <canvas id="categoryChart"></canvas>
                            </div>
                        </div>
                        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                            <div class="flex items-center justify-between mb-6">
                                <h3 class="font-bold text-slate-800">แนวโน้มการแจ้งซ่อม (6 เดือนล่าสุด)</h3>
                                <i data-lucide="trending-up" class="text-slate-400 w-5 h-5"></i>
                            </div>
                            <div class="h-[300px] flex items-center justify-center">
                                <canvas id="trendChart"></canvas>
                            </div>
                        </div>
                    </div>

                    <!-- Activity Feed (Col Span 1) -->
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                        <div class="flex items-center justify-between mb-6">
                            <h3 class="font-bold text-slate-800">กิจกรรมล่าสุด (Recent Activity)</h3>
                            <i data-lucide="activity" class="text-slate-400 w-5 h-5"></i>
                        </div>
                        <div id="activityFeed" class="space-y-4">
                            <!-- Activities will be loaded here -->
                            <div class="animate-pulse space-y-4">
                                <div class="flex gap-3">
                                    <div class="w-8 h-8 bg-slate-100 rounded-full"></div>
                                    <div class="flex-1 space-y-2">
                                        <div class="h-3 bg-slate-100 rounded w-1/2"></div>
                                        <div class="h-2 bg-slate-50 rounded w-1/4"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <button onclick="window.location.href='/settings.html'" class="w-full mt-6 py-3 text-xs font-bold text-slate-400 hover:text-indigo-600 border border-dashed border-slate-200 rounded-xl hover:border-indigo-200 transition-all">ดูประวัติทั้งหมด</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/assets/js/app.js"></script>
    <script>
        // Load Dashboard Stats
        async function loadDashboardStats() {
            const statsGrid = document.getElementById('statsGrid');
            try {
                const response = await apiFetch('/api/dashboard?action=getStats');
                const stats = await response.json();
                
                statsGrid.innerHTML = `
                    <div class="bg-white p-4 sm:p-6 rounded-2xl sm:rounded-3xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                        <div class="flex items-center gap-3 sm:gap-4 mb-3 sm:mb-4">
                            <div class="w-8 h-8 sm:w-10 sm:h-10 bg-blue-50 rounded-lg sm:rounded-xl flex items-center justify-center">
                                <i data-lucide="users" class="h-4 w-4 sm:h-5 sm:w-5 text-blue-600"></i>
                            </div>
                            <h4 class="text-xs sm:text-sm font-bold text-slate-500 uppercase tracking-wider">พนักงานทั้งหมด</h4>
                        </div>
                        <p class="text-2xl sm:text-4xl font-extrabold text-slate-900">${stats.totalUsers}</p>
                    </div>
                    <div class="bg-white p-4 sm:p-6 rounded-2xl sm:rounded-3xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                        <div class="flex items-center gap-3 sm:gap-4 mb-3 sm:mb-4">
                            <div class="w-8 h-8 sm:w-10 sm:h-10 bg-indigo-50 rounded-lg sm:rounded-xl flex items-center justify-center">
                                <i data-lucide="monitor" class="h-4 w-4 sm:h-5 sm:w-5 text-indigo-600"></i>
                            </div>
                            <h4 class="text-xs sm:text-sm font-bold text-slate-500 uppercase tracking-wider">ทรัพย์สินไอที</h4>
                        </div>
                        <p class="text-2xl sm:text-4xl font-extrabold text-slate-900">${stats.totalAssets}</p>
                    </div>
                    <div class="bg-white p-4 sm:p-6 rounded-2xl sm:rounded-3xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                        <div class="flex items-center gap-3 sm:gap-4 mb-3 sm:mb-4">
                            <div class="w-8 h-8 sm:w-10 sm:h-10 bg-amber-50 rounded-lg sm:rounded-xl flex items-center justify-center">
                                <i data-lucide="ticket" class="h-4 w-4 sm:h-5 sm:w-5 text-amber-600"></i>
                            </div>
                            <h4 class="text-xs sm:text-sm font-bold text-slate-500 uppercase tracking-wider">งานค้างซ่อม</h4>
                        </div>
                        <p class="text-2xl sm:text-4xl font-extrabold text-slate-900">${stats.pendingTickets}</p>
                    </div>
                    <div class="bg-white p-4 sm:p-6 rounded-2xl sm:rounded-3xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                        <div class="flex items-center gap-3 sm:gap-4 mb-3 sm:mb-4">
                            <div class="w-8 h-8 sm:w-10 sm:h-10 bg-emerald-50 rounded-lg sm:rounded-xl flex items-center justify-center">
                                <i data-lucide="check-circle" class="h-4 w-4 sm:h-5 sm:w-5 text-emerald-600"></i>
                            </div>
                            <h4 class="text-xs sm:text-sm font-bold text-slate-500 uppercase tracking-wider">ซ่อมเสร็จเดือนนี้</h4>
                        </div>
                        <p class="text-2xl sm:text-4xl font-extrabold text-slate-900">${stats.resolvedThisMonth}</p>
                    </div>
                `;
                lucide.createIcons();
            } catch (error) {
                console.error('Failed to load stats:', error);
                statsGrid.innerHTML = '<div class="col-span-full p-10 text-center text-red-500 font-bold">ไม่สามารถโหลดข้อมูลสถิติได้</div>';
            }
        }

        async function loadDashboardCharts() {
            try {
                const response = await apiFetch('/api/dashboard?action=getChartData');
                const data = await response.json();

                // Category Chart (Doughnut)
                data.assetsByCategory.sort((a, b) => parseInt(b.count) - parseInt(a.count));
                const categoryCtx = document.getElementById('categoryChart').getContext('2d');
                const totalCategoryAssets = data.assetsByCategory.reduce((sum, a) => sum + parseInt(a.count), 0);
                
                new Chart(categoryCtx, {
                    type: 'doughnut',
                    data: {
                        labels: data.assetsByCategory.map(a => a.category),
                        datasets: [{
                            data: data.assetsByCategory.map(a => a.count),
                            backgroundColor: ['#6366f1', '#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'],
                            borderWidth: 0,
                            spacing: 4,
                            hoverOffset: 15
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        layout: { padding: 20 },
                        plugins: {
                            tooltip: {
                                usePointStyle: true,
                                callbacks: {
                                    title: () => null,
                                    label: (context) => {
                                        const label = context.label || '';
                                        const value = context.parsed || context.raw;
                                        const percent = totalCategoryAssets > 0 ? Math.round((value / totalCategoryAssets) * 100) : 0;
                                        return [
                                            ` ${label}`,
                                            ` จำนวน: ${value} (${percent}%)`
                                        ];
                                    }
                                }
                            },
                            legend: { 
                                position: 'right', 
                                labels: { 
                                    usePointStyle: true, 
                                    padding: 20, 
                                    font: { weight: '600' },
                                    generateLabels: (chart) => {
                                        const datasets = chart.data.datasets;
                                        return chart.data.labels.map((label, i) => {
                                            const value = datasets[0].data[i];
                                            const percent = totalCategoryAssets > 0 ? Math.round((value / totalCategoryAssets) * 100) : 0;
                                            return {
                                                text: `${label}: ${value} (${percent}%)`,
                                                fillStyle: datasets[0].backgroundColor[i],
                                                strokeStyle: datasets[0].backgroundColor[i],
                                                pointStyle: 'circle',
                                                hidden: isNaN(datasets[0].data[i]) || chart.getDatasetMeta(0).data[i].hidden,
                                                index: i
                                            };
                                        });
                                    }
                                } 
                            }
                        },
                        cutout: '70%',
                        onHover: (event, chartElement) => {
                            event.native.target.style.cursor = chartElement[0] ? 'pointer' : 'default';
                        }
                    }
                });

                // Trend Chart (Bar)
                const trendCtx = document.getElementById('trendChart').getContext('2d');
                new Chart(trendCtx, {
                    type: 'bar',
                    data: {
                        labels: data.ticketTrends.map(t => t.month),
                        datasets: [{
                            label: 'จำนวนงานแจ้งซ่อม',
                            data: data.ticketTrends.map(t => t.count),
                            backgroundColor: 'rgba(99, 102, 241, 0.2)',
                            borderColor: '#6366f1',
                            borderWidth: 2,
                            borderRadius: 8,
                            borderSkipped: false
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { beginAtZero: true, grid: { display: false } },
                            x: { grid: { display: false } }
                        }
                    }
                });
            } catch (error) {
                console.error('Failed to load charts:', error);
            }
        }

        async function loadRecentActivity() {
            const feed = document.getElementById('activityFeed');
            try {
                const response = await apiFetch('/api/dashboard?action=getRecentActivity');
                if (!response.ok) throw new Error('API Error');
                const logs = await response.json();
                
                if (logs.length === 0) {
                    feed.innerHTML = '<div class="py-10 text-center text-slate-400 text-xs font-medium">ไม่มีกิจกรรมล่าสุด</div>';
                    return;
                }

                feed.innerHTML = logs.map(log => `
                    <div class="flex gap-3 group">
                        <div class="w-8 h-8 rounded-full ${log.action === 'Delete' ? 'bg-red-50 text-red-500' : log.action === 'Create' ? 'bg-emerald-50 text-emerald-500' : 'bg-amber-50 text-amber-500'} flex-shrink-0 flex items-center justify-center transition-transform group-hover:scale-110">
                            <i data-lucide="${log.module === 'Users' ? 'user' : log.module === 'Assets' ? 'monitor' : 'ticket'}" class="w-4 h-4"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-[11px] font-bold text-slate-700 leading-tight">
                                ${escapeHTML(log.user_name || 'System')} <span class="font-normal text-slate-500">${log.action === 'Create' ? 'เพิ่ม' : log.action === 'Delete' ? 'ลบ' : 'แก้ไข'} ${log.module}</span>
                            </p>
                            <p class="text-[10px] text-slate-400 mt-0.5">${new Date(log.created_at).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })} • ${log.module}</p>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (error) {
                console.error('Failed to load activity:', error);
                feed.innerHTML = '<div class="py-10 text-center text-red-400 text-xs font-medium">เกิดข้อผิดพลาดในการโหลด</div>';
            }
        }

        async function initDashboard() {
            try {
                const settings = await ui.getSystemSettings();
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                const isAdmin = user.role === 'Admin';

                // Update Welcome Message (Wait for elements to exist)
                const welcomeName = document.getElementById('welcomeName');
                if (welcomeName) welcomeName.innerText = user.name || 'User';

                // Render Module Cards Dynamically
                const welcomeGrid = document.getElementById('welcomeGrid');
                if (welcomeGrid) {
                    let gridHTML = ui.modules.map(m => {
                        if (ui.checkAccess(m.key, settings, user)) {
                            return `
                                <div class="p-6 sm:p-8 bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl hover:bg-white/20 transition-all cursor-pointer group" onclick="window.location.href='${m.path}'">
                                    <div class="flex items-center gap-4 mb-3">
                                        <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center group-hover:scale-110 transition-transform">
                                            <i data-lucide="${m.icon}" class="h-5 w-5 text-white"></i>
                                        </div>
                                        <h3 class="font-bold text-white text-lg sm:text-xl">${m.name}</h3>
                                    </div>
                                    <p class="text-indigo-100 text-xs sm:text-sm font-medium opacity-80 leading-relaxed">${m.desc}</p>
                                </div>
                            `;
                        }
                        return '';
                    }).join('');

                    // Add Settings card for Admin
                    if (isAdmin) {
                        gridHTML += `
                            <div class="p-6 sm:p-8 bg-slate-900/10 backdrop-blur-md border border-white/10 rounded-2xl hover:bg-slate-900/20 transition-all cursor-pointer group" onclick="window.location.href='/settings.html'">
                                <div class="flex items-center gap-4 mb-3">
                                    <div class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center group-hover:scale-110 transition-transform">
                                        <i data-lucide="settings" class="h-5 w-5 text-white"></i>
                                    </div>
                                    <h3 class="font-bold text-white text-lg sm:text-xl">ตั้งค่าระบบ</h3>
                                </div>
                                <p class="text-indigo-100 text-xs sm:text-sm font-medium opacity-80 leading-relaxed">จัดการโครงสร้างสาขา แผนก และสิทธิ์การใช้งาน</p>
                            </div>
                        `;
                    }
                    welcomeGrid.innerHTML = gridHTML;
                }

                loadDashboardStats();
                loadDashboardCharts();
                loadRecentActivity();
            } catch (err) {
                console.error("Dashboard Init Error:", err);
            }
        }

        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>

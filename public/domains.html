<!DOCTYPE html>
<html lang="th" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โดเมน & SSL | ITSM Admin</title>
    <script>
        if (!localStorage.getItem('token')) {
            window.location.replace('/login.html');
        }
    </script>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.454.0/lucide.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body class="h-full flex overflow-hidden">
    <div id="sidebarOverlay" class="fixed inset-0 bg-slate-900/50 z-40 hidden transition-opacity lg:hidden"></div>
    <div id="sidebar-container" class="lg:static"></div>

    <div class="flex-1 flex flex-col overflow-hidden">
        <div id="header-container"></div>

        <main class="flex-1 overflow-x-hidden overflow-y-auto p-4 sm:p-10 bg-slate-50/50">
            <div class="max-w-7xl mx-auto space-y-6 sm:space-y-10">
                <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
                    <div class="relative w-full md:w-96">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                            <i data-lucide="search" class="w-5 h-5"></i>
                        </div>
                        <input type="text" id="domainSearch" placeholder="ค้นหาโดเมน, Registrar..." 
                            class="block w-full pl-12 pr-4 py-3 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-600 outline-none transition-all shadow-sm bg-white">
                    </div>
                    <button onclick="openDomainModal()" class="w-full md:w-auto btn-primary">
                        <i data-lucide="plus-circle" class="w-5 h-5"></i> ลงทะเบียนโดเมนใหม่
                    </button>
                </div>

                <div class="card">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[1000px]">
                            <thead>
                                <tr class="bg-slate-50 border-b border-slate-200">
                                    <th class="th-cell">ชื่อโดเมน / Registrar</th>
                                    <th class="th-cell text-center">SSL Status</th>
                                    <th class="th-cell">Hosting / Provider</th>
                                    <th class="th-cell text-center">วันหมดอายุ (Domain)</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="domainTableBody" class="divide-y divide-slate-100">
                                <tr><td colspan="5" class="px-6 py-10 text-center text-slate-400">กำลังโหลดข้อมูล...</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="pagination-footer" id="pagination">
                        <!-- Pagination content will be injected by app.js helpers or local logic -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Domain Modal -->
    <div id="domainModal" class="modal-overlay hidden">
        <div class="modal-content max-w-2xl animate-in fade-in zoom-in duration-200">
            <div class="px-8 py-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/50 rounded-t-3xl">
                <h2 id="modalTitle" class="text-xl font-bold text-slate-800 tracking-tight">ลงทะเบียน Domain & Hosting</h2>
                <button onclick="closeDomainModal()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <form id="domainForm" class="p-8 space-y-6 max-h-[75vh] overflow-y-auto">
                <input type="hidden" id="domainId">
                
                <!-- Section: Domain -->
                <div class="space-y-4">
                    <div class="flex items-center gap-2 text-indigo-600">
                        <i data-lucide="globe" class="w-5 h-5"></i>
                        <h3 class="font-bold uppercase tracking-wider text-xs">ข้อมูลโดเมนหลัก</h3>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="form-label">ชื่อโดเมน *</label>
                            <input type="text" id="name" required placeholder="example.com" class="form-input">
                        </div>
                        <div>
                            <label class="form-label">ผู้ให้บริการจดทะเบียน</label>
                            <input type="text" id="registrar" placeholder="GoDaddy, THNIC" class="form-input">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="form-label">วันที่จดทะเบียน</label>
                            <input type="date" id="registrationDate" class="form-input">
                        </div>
                        <div>
                            <label class="form-label text-red-600">วันหมดอายุโดเมน *</label>
                            <input type="date" id="expirationDate" required class="form-input border-red-100 bg-red-50/30">
                        </div>
                    </div>
                </div>

                <!-- Section: SSL -->
                <div class="space-y-4 pt-4 border-t border-slate-100">
                    <div class="flex items-center gap-2 text-amber-600">
                        <i data-lucide="shield-check" class="w-5 h-5"></i>
                        <h3 class="font-bold uppercase tracking-wider text-xs">ใบรับรองความปลอดภัย (SSL/TLS)</h3>
                    </div>
                    <div class="grid grid-cols-3 gap-4">
                        <div>
                            <label class="form-label">ประเภท SSL</label>
                            <select id="sslType" class="form-input">
                                <option value="">-- ไม่ระบุ --</option>
                                <option value="Let's Encrypt (Free)">Let's Encrypt (Free)</option>
                                <option value="DV (Domain Validated)">DV (Domain Validated)</option>
                                <option value="OV (Organization Validated)">OV (Organization Validated)</option>
                                <option value="EV (Extended Validation)">EV (Extended Validation)</option>
                            </select>
                        </div>
                        <div>
                            <label class="form-label">ผู้ออกใบรับรอง (Issuer)</label>
                            <input type="text" id="sslIssuer" placeholder="Cloudflare, Sectigo" class="form-input">
                        </div>
                        <div>
                            <label class="form-label text-amber-600">วันหมดอายุ SSL</label>
                            <input type="date" id="sslExpiration" class="form-input border-amber-100 bg-amber-50/30">
                        </div>
                    </div>
                </div>

                <!-- Section: Hosting -->
                <div class="space-y-4 pt-4 border-t border-slate-100">
                    <div class="flex items-center gap-2 text-blue-600">
                        <i data-lucide="server" class="w-5 h-5"></i>
                        <h3 class="font-bold uppercase tracking-wider text-xs">โฮสติ้ง / เซิร์ฟเวอร์</h3>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="form-label">ผู้ให้บริการ Hosting</label>
                            <input type="text" id="hostingProvider" placeholder="DigitalOcean, AWS, Ruk-Com" class="form-input">
                        </div>
                        <div>
                            <label class="form-label">แพ็กเกจ / VPS สเปค</label>
                            <input type="text" id="hostingPackage" placeholder="Basic Shared / 4vCPU 8GB" class="form-input">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="form-label">ค่าใช้จ่ายรายปี (฿)</label>
                            <input type="number" id="hostingCost" placeholder="0" class="form-input">
                        </div>
                        <div>
                            <label class="form-label text-blue-600">วันหมดอายุ Hosting</label>
                            <input type="date" id="hostingExpiration" class="form-input border-blue-100 bg-blue-50/30">
                        </div>
                    </div>
                </div>

                <div class="pt-6 flex gap-3 sticky bottom-0 bg-white py-4 border-t border-slate-100 mt-auto">
                    <button type="button" onclick="closeDomainModal()" class="flex-1 px-6 py-3 rounded-2xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-all">ยกเลิก</button>
                    <button type="submit" class="flex-1 bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg shadow-indigo-600/20 hover:bg-indigo-500 transition-all flex items-center justify-center gap-2">
                        <i data-lucide="save" class="w-5 h-5"></i> บันทึกข้อมูล
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    <script src="/assets/js/app.js"></script>
    <script>
        let allDomains = [];
        let currentPage = 1;
        let itemsPerPage = 10;
        let totalCount = 0;
        let searchTimer = null;

        async function loadDomains() {
            const tableBody = document.getElementById('domainTableBody');
            ui.renderTableLoading('domainTableBody', 5);
            
            const search = document.getElementById('domainSearch').value;
            const params = new URLSearchParams({
                page: currentPage,
                limit: itemsPerPage,
                search: search
            });

            try {
                const response = await apiFetch(`/api/domains?${params.toString()}`);
                const data = await response.json();
                
                allDomains = data.domains;
                totalCount = data.totalCount;
                
                renderDomains();
                renderPagination();
            } catch (err) {
                tableBody.innerHTML = `<tr><td colspan="5" class="px-6 py-10 text-center text-red-500 font-bold">ไม่สามารถโหลดข้อมูลได้: ${err.message}</td></tr>`;
            }
        }

        function renderDomains() {
            const tbody = document.getElementById('domainTableBody');
            if (allDomains.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-10 text-center text-slate-400">ไม่พบข้อมูลโดเมน</td></tr>';
                return;
            }

            tbody.innerHTML = allDomains.map(d => {
                const domainExp = new Date(d.expiration_date);
                const isExpiring = (domainExp - new Date()) / (1000 * 60 * 60 * 24) < 30;
                const isExpired = domainExp < new Date();
                
                let sslStatus = '<span class="px-3 py-1 bg-slate-100 text-slate-400 rounded-full text-[10px] font-bold uppercase tracking-wider">No SSL</span>';
                if (d.ssl_expiration) {
                    const sslExp = new Date(d.ssl_expiration);
                    const sslDiff = (sslExp - new Date()) / (1000 * 60 * 60 * 24);
                    const sslClass = sslDiff < 15 ? 'bg-red-50 text-red-600' : sslDiff < 30 ? 'bg-amber-50 text-amber-600' : 'bg-emerald-50 text-emerald-600';
                    sslStatus = `<span class="px-3 py-1 ${sslClass} rounded-full text-[10px] font-bold uppercase tracking-wider">${d.ssl_type || 'Active'}</span>`;
                }

                return `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-4">
                            <div class="font-bold text-slate-800 text-sm">${escapeHTML(d.name)}</div>
                            <div class="text-[10px] text-slate-400 font-medium">${escapeHTML(d.registrar || 'ไม่ระบุ Registrar')}</div>
                        </td>
                        <td class="px-6 py-4 text-center">
                            ${sslStatus}
                        </td>
                        <td class="px-6 py-4">
                            <div class="text-sm font-semibold text-slate-700">${escapeHTML(d.hosting_provider || '-')}</div>
                            <div class="text-[10px] text-slate-400">${escapeHTML(d.hosting_package || '')}</div>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <div class="text-sm font-bold ${isExpired ? 'text-red-600' : isExpiring ? 'text-amber-600' : 'text-slate-700'}">
                                ${new Date(d.expiration_date).toLocaleDateString('th-TH')}
                            </div>
                            <div class="text-[10px] text-slate-400">${isExpired ? 'หมดอายุแล้ว' : isExpiring ? 'ใกล้หมดอายุ' : 'ปกติ'}</div>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <div class="flex justify-end gap-1">
                                <button onclick="editDomain('${d.id}')" class="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition-all active:scale-95">
                                    <i data-lucide="edit-3" class="w-4 h-4"></i>
                                </button>
                                <button onclick="deleteDomain('${d.id}', '${escapeHTML(d.name)}')" class="p-2 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-xl transition-all active:scale-95">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
            lucide.createIcons();
        }

        function renderPagination() {
            const container = document.getElementById('pagination');
            const totalPages = Math.ceil(totalCount / itemsPerPage);
            
            container.innerHTML = `
                <div class="flex items-center gap-4">
                    <div class="text-xs font-bold text-slate-500 uppercase tracking-wider">
                        ทั้งหมด ${totalCount} รายการ
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''} class="pagination-btn-nav">
                        <i data-lucide="chevron-left" class="w-5 h-5"></i>
                    </button>
                    <div class="flex items-center gap-1">
                        ${Array.from({length: Math.min(5, totalPages)}, (_, i) => {
                            const p = i + 1;
                            return `<button onclick="changePage(${p})" class="pagination-btn ${p === currentPage ? 'pagination-btn-active' : 'pagination-btn-inactive'}">${p}</button>`;
                        }).join('')}
                    </div>
                    <button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''} class="pagination-btn-nav">
                        <i data-lucide="chevron-right" class="w-5 h-5"></i>
                    </button>
                </div>
            `;
            lucide.createIcons();
        }

        function changePage(p) {
            currentPage = p;
            loadDomains();
        }

        function openDomainModal() {
            document.getElementById('modalTitle').innerText = 'ลงทะเบียนโดเมนใหม่';
            document.getElementById('domainId').value = '';
            document.getElementById('domainForm').reset();
            document.getElementById('domainModal').classList.remove('hidden');
        }

        function closeDomainModal() {
            document.getElementById('domainModal').classList.add('hidden');
        }

        function editDomain(id) {
            const d = allDomains.find(x => x.id === id);
            if (!d) return;
            
            document.getElementById('modalTitle').innerText = 'แก้ไขข้อมูลโดเมน';
            document.getElementById('domainId').value = d.id;
            document.getElementById('name').value = d.name;
            document.getElementById('registrar').value = d.registrar || '';
            document.getElementById('registrationDate').value = d.registration_date ? d.registration_date.split('T')[0] : '';
            document.getElementById('expirationDate').value = d.expiration_date ? d.expiration_date.split('T')[0] : '';
            document.getElementById('sslType').value = d.ssl_type || '';
            document.getElementById('sslIssuer').value = d.ssl_issuer || '';
            document.getElementById('sslExpiration').value = d.ssl_expiration ? d.ssl_expiration.split('T')[0] : '';
            document.getElementById('hostingProvider').value = d.hosting_provider || '';
            document.getElementById('hostingPackage').value = d.hosting_package || '';
            document.getElementById('hostingCost').value = d.hosting_cost || 0;
            document.getElementById('hostingExpiration').value = d.hosting_expiration ? d.hosting_expiration.split('T')[0] : '';
            
            document.getElementById('domainModal').classList.remove('hidden');
        }

        async function deleteDomain(id, name) {
            const confirmed = await notify.confirm('ยืนยันการลบ', `คุณต้องการลบโดเมน "${name}" ใช่หรือไม่?`);
            if (confirmed) {
                try {
                    const res = await apiFetch(`/api/domains?action=delete&id=${id}`, { method: 'POST' });
                    if (res.ok) {
                        notify.success('ลบข้อมูลเรียบร้อย');
                        loadDomains();
                    }
                } catch (err) {
                    notify.error('ไม่สามารถลบข้อมูลได้');
                }
            }
        }

        document.getElementById('domainForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('domainId').value;
            const data = {
                id: id || null,
                name: document.getElementById('name').value,
                registrar: document.getElementById('registrar').value,
                registration_date: document.getElementById('registrationDate').value,
                expiration_date: document.getElementById('expirationDate').value,
                ssl_type: document.getElementById('sslType').value,
                ssl_issuer: document.getElementById('sslIssuer').value,
                ssl_expiration: document.getElementById('sslExpiration').value,
                hosting_provider: document.getElementById('hostingProvider').value,
                hosting_package: document.getElementById('hostingPackage').value,
                hosting_cost: document.getElementById('hostingCost').value,
                hosting_expiration: document.getElementById('hostingExpiration').value
            };

            try {
                const res = await apiFetch('/api/domains', {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    notify.success(id ? 'บันทึกการแก้ไขแล้ว' : 'ลงทะเบียนสำเร็จ');
                    closeDomainModal();
                    loadDomains();
                }
            } catch (err) {
                notify.error('เกิดข้อผิดพลาดในการบันทึก');
            }
        });

        document.getElementById('domainSearch').addEventListener('input', () => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                currentPage = 1;
                loadDomains();
            }, 500);
        });

        document.addEventListener('DOMContentLoaded', () => {
            ui.renderHeader('โดเมน & SSL');
            ui.renderSidebar('sidebar-container');
            loadDomains();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการวัสดุสิ้นเปลือง | ITSM Admin</title>
    <script>
        if (!localStorage.getItem('token')) {
            window.location.replace('/login.html');
        }
    </script>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.454.0/lucide.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body class="h-full flex overflow-hidden">
    <div id="sidebarOverlay" class="fixed inset-0 bg-slate-900/50 z-40 hidden lg:hidden"></div>
    <div id="sidebar-container" class="lg:static"></div>

    <div class="flex-1 flex flex-col overflow-hidden">
        <div id="header-container"></div>

        <main class="flex-1 overflow-x-hidden overflow-y-auto p-4 sm:p-10 bg-slate-50/50">
            <div class="max-w-6xl mx-auto space-y-6 sm:space-y-10">
                <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
                    <div class="relative w-full md:w-96">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                            <i data-lucide="search" class="w-5 h-5"></i>
                        </div>
                        <input type="text" id="consumableSearch" placeholder="ค้นหาพัสดุ, หมวดหมู่, สถานที่เก็บ..." 
                            class="block w-full pl-12 pr-4 py-3 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-rose-600 outline-none transition-all shadow-sm bg-white">
                    </div>
                    <button onclick="openAddModal()" class="w-full md:w-auto px-6 py-3 bg-rose-600 text-white rounded-2xl font-bold shadow-lg shadow-rose-600/20 hover:bg-rose-500 transition-all flex items-center justify-center gap-2 active:scale-95 cursor-pointer">
                        <i data-lucide="plus-circle" class="w-5 h-5"></i> เพิ่มรายการพัสดุ
                    </button>
                </div>

                <div class="card overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[800px]">
                            <thead>
                                <tr class="bg-slate-50 border-b border-slate-200">
                                    <th class="th-cell">พัสดุ / วัสดุสิ้นเปลือง</th>
                                    <th class="th-cell">หมวดหมู่</th>
                                    <th class="th-cell">สถานที่เก็บ</th>
                                    <th class="th-cell text-center">คงเหลือ</th>
                                    <th class="th-cell text-center">จัดการสต็อก</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">ดำเนินการ</th>
                                </tr>
                            </thead>
                            <tbody id="consumableTableBody" class="divide-y divide-slate-100">
                                <!-- Data will be injected here -->
                                <tr><td colspan="6" class="px-6 py-10 text-center text-slate-400">กำลังโหลดพัสดุ...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Modal -->
    <div id="consumableModal" class="modal-overlay hidden">
        <div class="modal-content animate-in fade-in zoom-in duration-200">
            <div class="px-8 py-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/50 rounded-t-3xl">
                <h2 id="modalTitle" class="text-xl font-bold text-slate-800 tracking-tight">เพิ่มรายการพัสดุ</h2>
                <button onclick="closeModal('consumableModal')" class="text-slate-400 hover:text-slate-600 transition-all active:scale-90 cursor-pointer"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <form id="consumableForm" class="p-8 space-y-5">
                <input type="hidden" id="consumableId">
                <div>
                    <label class="form-label">ชื่อพัสดุ / วัสดุสิ้นเปลือง</label>
                    <input type="text" id="itemName" required placeholder="เช่น Mouse Wireless, หมึก HP 85A" class="form-input">
                </div>
                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="form-label">หมวดหมู่</label>
                        <input type="text" id="itemCategory" placeholder="เช่น Peripherals, Network" class="form-input">
                    </div>
                    <div>
                        <label class="form-label">หน่วยนับ</label>
                        <input type="text" id="itemUnit" placeholder="ชิ้น, กล่อง, ม้วน" class="form-input">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="form-label">จุดแจ้งเตือนขั้นต่ำ</label>
                        <input type="number" id="itemMinQty" required min="0" value="5" class="form-input">
                    </div>
                    <div>
                        <label class="form-label">สถานที่จัดเก็บ (Location)</label>
                        <input type="text" id="itemLocation" placeholder="เช่น ตู้ A1, ชั้น 2" class="form-input">
                    </div>
                </div>
                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="closeModal('consumableModal')" class="flex-1 px-6 py-3 rounded-2xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-all active:scale-95 cursor-pointer">ยกเลิก</button>
                    <button type="submit" class="flex-1 bg-rose-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg shadow-rose-600/20 hover:bg-rose-500 transition-all active:scale-95 cursor-pointer">บันทึกข้อมูล</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Adjust Stock Modal -->
    <div id="adjustModal" class="modal-overlay hidden">
        <div class="modal-content max-w-sm animate-in fade-in zoom-in duration-200">
            <div class="px-8 py-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/50 rounded-t-3xl">
                <h2 id="adjustTitle" class="text-lg font-bold text-slate-800">จัดการสต็อก</h2>
                <button onclick="closeModal('adjustModal')" class="text-slate-400 hover:text-slate-600 transition-all active:scale-90 cursor-pointer"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <form id="adjustForm" class="p-8 space-y-5">
                <input type="hidden" id="adjustId">
                <input type="hidden" id="adjustType">
                <div class="text-center pb-2">
                    <h3 id="adjustItemName" class="text-sm font-bold text-slate-600 uppercase tracking-wider">Loading...</h3>
                </div>
                <div>
                    <label class="form-label">จำนวนที่<span id="adjustActionText">นำเข้า</span></label>
                    <input type="number" id="adjustQty" required min="1" value="1" class="form-input text-center text-3xl font-extrabold text-slate-800">
                </div>
                <div>
                    <label class="form-label">หมายเหตุ / เหตุผลเบิกออก</label>
                    <textarea id="adjustNotes" class="form-input h-20 py-3" placeholder="เช่น เบิกไปใช้กับแผนกไอที, รับเข้าจาก Vendor A"></textarea>
                </div>
                <button type="submit" id="adjustSubmitBtn" class="w-full py-4 rounded-2xl font-bold text-white transition-all shadow-lg active:scale-95 cursor-pointer">
                    ยืนยันการทำรายการ
                </button>
            </form>
        </div>
    </div>

    <!-- History Modal -->
    <div id="historyModal" class="modal-overlay hidden">
        <div class="modal-content max-w-2xl animate-in fade-in zoom-in duration-200 h-[600px] flex flex-col">
            <div class="px-8 py-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/50 rounded-t-3xl">
                <div>
                    <h2 class="text-lg font-bold text-slate-800">ประวัติการเบิก-รับเข้า</h2>
                    <p id="historyItemName" class="text-xs text-slate-400 font-bold uppercase tracking-widest mt-1">Item Name</p>
                </div>
                <button onclick="closeModal('historyModal')" class="text-slate-400 hover:text-slate-600 transition-all active:scale-90 cursor-pointer"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-8">
                <div class="space-y-4" id="historyList">
                    <!-- History logs here -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/assets/js/app.js"></script>
    <script>
        let allItems = [];
        let searchTimer = null;

        let currentSettings = null;

        async function init() {
            currentSettings = await ui.getSystemSettings();
            if (!ui.checkAccess('consumables', currentSettings, null, 'view')) {
                window.location.replace('/index.html');
                return;
            }

            if (!ui.checkAccess('consumables', currentSettings, null, 'create')) {
                document.querySelector('button[onclick="openAddModal()"]')?.remove();
            }

            ui.renderHeader('จัดการวัสดุสิ้นเปลือง');
            loadItems();
        }

        async function loadItems() {
            const search = document.getElementById('consumableSearch').value;
            const res = await apiFetch(`/api/consumables?search=${encodeURIComponent(search)}`);
            if (res && res.ok) {
                allItems = await res.json();
                renderItems();
            }
        }

        function renderItems() {
            const tbody = document.getElementById('consumableTableBody');
            if (allItems.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-10 text-center text-slate-400 font-medium">ไม่พบรายการพัสดุ</td></tr>';
                return;
            }

            tbody.innerHTML = allItems.map(item => {
                const isLow = item.quantity <= item.min_quantity;
                return `
                    <tr class="hover:bg-slate-50 transition-colors group">
                        <td class="px-6 py-4">
                            <div class="font-bold text-slate-800">${escapeHTML(item.name)}</div>
                            <div class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mt-0.5">MIN Threshold: ${item.min_quantity} ${escapeHTML(item.unit)}</div>
                        </td>
                        <td class="px-6 py-4">
                            <span class="px-2.5 py-1 bg-slate-100 text-slate-500 rounded-lg text-[10px] font-bold uppercase tracking-widest">${escapeHTML(item.category || 'GENERAL')}</span>
                        </td>
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-1.5 text-xs text-slate-500 font-medium">
                                <i data-lucide="map-pin" class="w-3 h-3 text-slate-300"></i>
                                ${escapeHTML(item.location || '-')}
                            </div>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <div class="inline-flex items-baseline gap-1">
                                <span class="text-xl font-extrabold ${isLow ? 'text-red-500 animate-pulse' : 'text-slate-800'}">${item.quantity}</span>
                                <span class="text-[10px] font-bold text-slate-400 uppercase">${escapeHTML(item.unit || 'ชิ้น')}</span>
                            </div>
                            ${isLow ? '<div class="text-[9px] text-red-500 font-bold uppercase mt-0.5 tracking-tighter">Stock Low</div>' : ''}
                        </td>
                        <td class="px-6 py-4">
                            <div class="flex items-center justify-center gap-1">
                                ${ui.checkAccess('consumables', currentSettings, null, 'edit') ? `
                                    <button onclick="openAdjustModal('${item.id}', 'IN')" title="รับเข้าพัสดุ" class="btn-icon btn-icon-emerald">
                                        <i data-lucide="plus" class="w-4 h-4"></i>
                                    </button>
                                    <button onclick="openAdjustModal('${item.id}', 'OUT')" title="เบิกพัสดุ" class="btn-icon btn-icon-rose">
                                        <i data-lucide="minus" class="w-4 h-4"></i>
                                    </button>
                                ` : ''}
                            </div>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <div class="flex items-center justify-end gap-1 opacity-40 group-hover:opacity-100 transition-opacity">
                                <button onclick="viewHistory('${item.id}')" title="ดูประวัติ" class="btn-icon btn-icon-indigo">
                                    <i data-lucide="history" class="w-4 h-4"></i>
                                </button>
                                ${ui.checkAccess('consumables', currentSettings, null, 'edit') ? `
                                    <button onclick="openEditModal('${item.id}')" title="แก้ไขข้อมูล" class="btn-icon">
                                        <i data-lucide="edit-3" class="w-4 h-4"></i>
                                    </button>
                                ` : `
                                    <button onclick="openEditModal('${item.id}')" title="ดูรายละเอียด" class="btn-icon btn-icon-slate">
                                        <i data-lucide="eye" class="w-4 h-4"></i>
                                    </button>
                                `}
                                ${ui.checkAccess('consumables', currentSettings, null, 'delete') ? `
                                    <button onclick="deleteItem('${item.id}')" title="ลบทิ้ง" class="btn-icon btn-icon-rose">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    </button>
                                ` : ''}
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
            lucide.createIcons();
        }

        function openAddModal() {
            document.getElementById('modalTitle').innerText = 'เพิ่มรายการพัสดุ';
            document.getElementById('consumableForm').reset();
            document.getElementById('consumableId').value = '';
            document.getElementById('consumableModal').classList.remove('hidden');
        }

        function openEditModal(id) {
            const item = allItems.find(i => i.id === id);
            if (!item) return;

            const hasEditAccess = ui.checkAccess('consumables', currentSettings, null, 'edit');
            
            document.getElementById('modalTitle').innerText = hasEditAccess ? 'แก้ไขรายการพัสดุ' : 'รายละเอียดพัสดุ';
            document.getElementById('consumableId').value = item.id;
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemCategory').value = item.category || '';
            document.getElementById('itemUnit').value = item.unit || 'ชิ้น';
            document.getElementById('itemMinQty').value = item.min_quantity;
            document.getElementById('itemLocation').value = item.location || '';
            
            // Toggle fields
            const formInputs = document.querySelectorAll('#consumableForm input');
            formInputs.forEach(input => {
                if (input.id !== 'consumableId') input.disabled = !hasEditAccess;
            });

            // Toggle save button
            const saveBtn = document.querySelector('#consumableForm button[type="submit"]');
            if (saveBtn) saveBtn.style.display = hasEditAccess ? 'block' : 'none';

            document.getElementById('consumableModal').classList.remove('hidden');
        }

        function openAdjustModal(id, type) {
            const item = allItems.find(i => i.id === id);
            if (!item) return;
            document.getElementById('adjustId').value = id;
            document.getElementById('adjustType').value = type;
            document.getElementById('adjustItemName').innerText = item.name;
            document.getElementById('adjustQty').value = 1;
            document.getElementById('adjustNotes').value = '';
            
            const actionText = type === 'IN' ? 'นำเข้า' : 'เบิกออก';
            document.getElementById('adjustActionText').innerText = actionText;
            document.getElementById('adjustTitle').innerText = actionText + 'สต็อก';
            
            const btn = document.getElementById('adjustSubmitBtn');
            btn.className = type === 'IN' 
                ? 'w-full py-4 rounded-2xl font-bold text-white bg-emerald-600 shadow-lg shadow-emerald-600/20 hover:bg-emerald-500 transition-all active:scale-95 cursor-pointer'
                : 'w-full py-4 rounded-2xl font-bold text-white bg-rose-600 shadow-lg shadow-rose-600/20 hover:bg-rose-500 transition-all active:scale-95 cursor-pointer';
            
            document.getElementById('adjustModal').classList.remove('hidden');
        }

        async function viewHistory(id) {
            const item = allItems.find(i => i.id === id);
            if (!item) return;
            document.getElementById('historyItemName').innerText = item.name;
            document.getElementById('historyList').innerHTML = '<div class="text-center py-20 text-slate-400">กำลังโหลด...</div>';
            document.getElementById('historyModal').classList.remove('hidden');
            
            try {
                const res = await apiFetch(`/api/consumables?action=getHistory&id=${id}`);
                if (res && res.ok) {
                    const logs = await res.json();
                    const list = document.getElementById('historyList');
                    if (logs.length === 0) {
                        list.innerHTML = '<div class="text-center py-20 text-slate-400 italic">ไม่มีประวัติการใช้งาน</div>';
                        return;
                    }
                    list.innerHTML = logs.map(l => `
                        <div class="flex items-start gap-4 p-5 rounded-2xl bg-slate-50 border border-slate-100 hover:border-indigo-100 transition-colors">
                            <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 ${l.action === 'IN' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}">
                                <i data-lucide="${l.action === 'IN' ? 'arrow-down-left' : 'arrow-up-right'}" class="w-5 h-5"></i>
                            </div>
                            <div class="flex-1">
                                <div class="flex justify-between items-start mb-1 gap-2">
                                    <p class="text-sm font-bold text-slate-800">${l.action === 'IN' ? 'นำเข้า' : 'เบิกออก'} ${l.quantity} ${escapeHTML(item.unit || 'ชิ้น')}</p>
                                    <span class="text-[10px] text-slate-400 font-bold uppercase tracking-wider whitespace-nowrap">${new Date(l.created_at).toLocaleString('th-TH')}</span>
                                </div>
                                <p class="text-xs text-slate-500 line-clamp-2">${escapeHTML(l.notes || 'ไม่ได้ระบุหมายเหตุ')}</p>
                                <div class="flex items-center gap-1.5 mt-2">
                                    <div class="w-4 h-4 rounded-full bg-indigo-100 flex items-center justify-center text-[8px] font-bold text-indigo-600 uppercase">${(l.user_name || 'S').charAt(0)}</div>
                                    <p class="text-[10px] text-indigo-500 font-bold uppercase tracking-widest">${escapeHTML(l.user_name || 'System')}</p>
                                </div>
                            </div>
                        </div>
                    `).join('');
                    lucide.createIcons();
                }
            } catch (err) {
                document.getElementById('historyList').innerHTML = '<div class="text-center py-20 text-red-400">เกิดข้อผิดพลาดในการโหลดข้อมูล</div>';
            }
        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
        }

        async function deleteItem(id) {
            const confirmed = await notify.confirm('ยืนยันการลบ', 'คุณต้องการลบรายการพัสดุนี้ใช่หรือไม่? ข้อมูลประวัติทั้งหมดจะถูกลบไปด้วย');
            if (confirmed) {
                const res = await apiFetch(`/api/consumables?action=delete&id=${id}`, { method: 'POST' });
                if (res && res.ok) {
                    notify.success('ลบข้อมูลสำเร็จ');
                    loadItems();
                }
            }
        }

        document.getElementById('consumableForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('consumableId').value;
            const data = {
                id: id || null,
                name: document.getElementById('itemName').value,
                category: document.getElementById('itemCategory').value,
                unit: document.getElementById('itemUnit').value,
                min_quantity: parseInt(document.getElementById('itemMinQty').value),
                location: document.getElementById('itemLocation').value
            };

            const res = await apiFetch('/api/consumables', {
                method: 'POST',
                body: JSON.stringify(data)
            });

            if (res && res.ok) {
                notify.success(id ? 'แก้ไขข้อมูลสำเร็จ' : 'เพิ่มข้อมูลสำเร็จ');
                closeModal('consumableModal');
                loadItems();
            }
        });

        document.getElementById('adjustForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const type = document.getElementById('adjustType').value;
            const qty = parseInt(document.getElementById('adjustQty').value);
            const item = allItems.find(i => i.id === document.getElementById('adjustId').value);

            if (type === 'OUT' && qty > item.quantity) {
                return notify.error('จำนวนพัสดุในสต็อกไม่เพียงพอ');
            }

            const data = {
                id: item.id,
                adjustment: qty,
                type: type,
                notes: document.getElementById('adjustNotes').value
            };

            const res = await apiFetch('/api/consumables?action=adjust', {
                method: 'POST',
                body: JSON.stringify(data)
            });

            if (res && res.ok) {
                notify.success('บันทึกรายการสำเร็จ');
                closeModal('adjustModal');
                loadItems();
            }
        });

        document.getElementById('consumableSearch').addEventListener('input', () => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(loadItems, 500);
        });

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>

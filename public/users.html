<!DOCTYPE html>
<html lang="th" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการผู้ใช้งาน | ITSM Admin</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.454.0/lucide.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', 'Sarabun', sans-serif; }
    </style>
</head>
<body class="h-full flex overflow-hidden">
    <!-- Mobile Sidebar Overlay -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-slate-900/50 z-40 hidden transition-opacity lg:hidden"></div>

    <!-- Sidebar (Same as index.html) -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-slate-900 text-white flex flex-col h-full shadow-2xl transition-transform duration-300 z-50 -translate-x-full lg:translate-x-0 lg:static">
        <div class="h-20 flex items-center justify-between px-6 border-b border-slate-800">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-blue-400 rounded-xl flex items-center justify-center text-white font-bold text-lg shadow-lg shadow-indigo-500/30">IT</div>
                <div>
                    <span class="font-bold text-base tracking-tight block leading-tight">ITSM</span>
                    <span class="text-[10px] text-slate-400 block leading-tight font-medium">Enterprise Admin</span>
                </div>
            </div>
            <!-- Close button for mobile -->
            <button id="closeSidebar" class="lg:hidden text-slate-400 hover:text-white p-1">
                <i data-lucide="x" class="h-6 w-6"></i>
            </button>
        </div>
        <nav class="flex-1 py-6 overflow-y-auto">
            <div class="px-6 mb-4">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.1em]">หลัก (Main)</p>
            </div>
            <div class="space-y-1 px-3">
                <a href="/" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all">
                    <i data-lucide="layout-dashboard" class="mr-3 h-5 w-5"></i> หน้าแรก
                </a>
                <a href="/users.html" class="flex items-center px-4 py-3 text-sm font-semibold rounded-xl bg-indigo-600 text-white shadow-lg shadow-indigo-600/20 transition-all">
                    <i data-lucide="users" class="mr-3 h-5 w-5"></i> จัดการผู้ใช้งาน
                </a>
                <a href="/settings.html" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all">
                    <i data-lucide="settings" class="mr-3 h-5 w-5"></i> ตั้งค่าระบบ
                </a>
            </div>
        </nav>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-4 sm:px-10 shadow-sm z-10">
            <div class="flex items-center gap-4">
                <!-- Mobile Menu Button -->
                <button id="openSidebar" class="lg:hidden text-slate-500 hover:text-indigo-600 p-2 rounded-xl hover:bg-slate-50 transition-all">
                    <i data-lucide="menu" class="h-6 w-6"></i>
                </button>
                <h1 class="text-lg sm:text-xl font-bold text-slate-800 tracking-tight">จัดการผู้ใช้งาน</h1>
            </div>
            <div class="flex items-center gap-2 sm:gap-6">
                <!-- User Profile Header Section -->
                <div class="flex items-center gap-2 sm:gap-4">
                    <div class="text-right hidden md:block">
                        <p id="userName" class="text-sm font-bold text-slate-800 leading-tight">Loading...</p>
                        <p id="userRole" class="text-[10px] text-slate-500 font-bold uppercase tracking-wider leading-tight">System Admin</p>
                        <p id="currentTime" class="text-[10px] font-semibold text-slate-500 mt-0.5">30/03/2026</p>
                    </div>
                    <div class="relative group">
                        <button onclick="window.location.href='/profile.html'" class="flex items-center gap-3 p-1 rounded-2xl hover:bg-slate-50 transition-all border border-transparent hover:border-slate-100" title="แก้ไขข้อมูลส่วนตัว">
                            <div id="userAvatar" class="w-9 h-9 sm:w-10 sm:h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-blue-500 flex items-center justify-center text-white font-bold text-xs sm:text-sm shadow-lg shadow-indigo-500/20 overflow-hidden">U</div>
                        </button>
                    </div>
                    <button id="logoutBtn" class="w-9 h-9 sm:w-10 sm:h-10 flex items-center justify-center rounded-xl text-slate-400 hover:text-red-500 hover:bg-red-50 transition-all group" title="ออกจากระบบ">
                        <i data-lucide="log-out" class="h-5 w-5 group-hover:translate-x-0.5 transition-transform"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-x-hidden overflow-y-auto p-4 sm:p-10 bg-slate-50/50">
            <div class="max-w-6xl mx-auto space-y-6 sm:space-y-10">
                <!-- Action Bar: Search and Add User -->
                <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
                    <div class="relative w-full md:w-96">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                            <i data-lucide="search" class="w-5 h-5"></i>
                        </div>
                        <input type="text" placeholder="ค้นหาชื่อ หรืออีเมลพนักงาน..." 
                            class="block w-full pl-12 pr-4 py-3 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-600 outline-none transition-all shadow-sm bg-white">
                    </div>
                    
                    <div id="addUserBtnContainer" class="w-full md:w-auto">
                        <button class="w-full md:w-auto bg-indigo-600 text-white px-6 py-3 rounded-2xl text-sm font-bold shadow-lg shadow-indigo-600/20 hover:bg-indigo-500 transition-all flex items-center justify-center gap-2 active:scale-95">
                            <i data-lucide="user-plus" class="w-5 h-5"></i> เพิ่มผู้ใช้งานใหม่
                        </button>
                    </div>
                </div>
                <div class="bg-white rounded-2xl sm:rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[600px]">
                            <thead>
                                <tr class="bg-slate-50 border-b border-slate-200">
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">ชื่อ-นามสกุล</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">อีเมล</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">บทบาท</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">แผนก</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-center">สถานะ</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">แก้ไข</th>
                                </tr>
                            </thead>
                            <tbody id="userTableBody" class="divide-y divide-slate-100">
                                <!-- Users will be loaded here -->
                                <tr><td colspan="6" class="px-6 py-10 text-center text-slate-400">กำลังโหลดข้อมูล...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Edit User Modal -->
    <div id="editModal" class="fixed inset-0 bg-slate-900/50 z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg overflow-hidden animate-in fade-in zoom-in duration-200">
            <div class="px-8 py-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                <h2 class="text-xl font-bold text-slate-800 tracking-tight">แก้ไขข้อมูลผู้ใช้งาน</h2>
                <button onclick="closeEditModal()" class="text-slate-400 hover:text-slate-600 transition-colors">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <form id="editForm" class="p-8 space-y-5">
                <input type="hidden" id="editUserId">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">ชื่อ-นามสกุล</label>
                    <input type="text" id="editName" required class="block w-full px-4 py-3 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-600 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">ชื่อผู้ใช้งาน / อีเมล</label>
                    <input type="text" id="editEmail" required class="block w-full px-4 py-3 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-600 outline-none transition-all">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">บทบาท</label>
                        <select id="editRole" required class="block w-full px-4 py-3 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-600 outline-none transition-all bg-white">
                            <!-- Roles populated by JS -->
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">แผนก</label>
                        <select id="editDept" class="block w-full px-4 py-3 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-600 outline-none transition-all bg-white">
                            <option value="">ไม่มีแผนก</option>
                            <!-- Departments populated by JS -->
                        </select>
                    </div>
                </div>
                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="closeEditModal()" class="flex-1 px-6 py-3 rounded-2xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-all active:scale-95">ยกเลิก</button>
                    <button type="submit" class="flex-1 bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg shadow-indigo-600/20 hover:bg-indigo-500 transition-all active:scale-95 flex items-center justify-center gap-2">
                        <i data-lucide="save" class="w-5 h-5"></i> บันทึกการแก้ไข
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/assets/js/app.js"></script>
    <script>
        // Mobile Sidebar Toggle
        const openSidebar = document.getElementById('openSidebar');
        const closeSidebar = document.getElementById('closeSidebar');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');

        function toggleSidebar() {
            sidebar.classList.toggle('-translate-x-full');
            sidebarOverlay.classList.toggle('hidden');
        }

        if (openSidebar) openSidebar.addEventListener('click', toggleSidebar);
        if (closeSidebar) closeSidebar.addEventListener('click', toggleSidebar);
        if (sidebarOverlay) sidebarOverlay.addEventListener('click', toggleSidebar);

        // Edit Modal Logic
        const editModal = document.getElementById('editModal');
        const editForm = document.getElementById('editForm');
        let optionsLoaded = false;

        async function loadOptions() {
            if (optionsLoaded) return;
            try {
                const response = await apiFetch('/api/users?action=getOptions');
                const { roles, departments } = await response.json();
                
                const roleSelect = document.getElementById('editRole');
                const deptSelect = document.getElementById('editDept');
                
                roleSelect.innerHTML = roles.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
                deptSelect.innerHTML = '<option value="">ไม่มีแผนก</option>' + 
                    departments.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
                
                optionsLoaded = true;
            } catch (err) {
                console.error('Failed to load options:', err);
            }
        }

        async function openEditModal(id, name, email, roleId, deptId) {
            await loadOptions();
            document.getElementById('editUserId').value = id;
            document.getElementById('editName').value = name;
            document.getElementById('editEmail').value = email;
            document.getElementById('editRole').value = roleId;
            document.getElementById('editDept').value = deptId || '';
            
            editModal.classList.remove('hidden');
            lucide.createIcons();
        }

        function closeEditModal() {
            editModal.classList.add('hidden');
        }

        editForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editUserId').value;
            const name = document.getElementById('editName').value;
            const email = document.getElementById('editEmail').value;
            const role_id = document.getElementById('editRole').value;
            const department_id = document.getElementById('editDept').value || null;

            try {
                const response = await apiFetch('/api/users', {
                    method: 'POST',
                    body: JSON.stringify({ id, name, email, role_id, department_id })
                });

                if (response.ok) {
                    notify.success('แก้ไขข้อมูลสำเร็จ!');
                    closeEditModal();
                    loadUsers(); // Refresh table
                } else {
                    const err = await response.json();
                    notify.error(err.message || 'เกิดข้อผิดพลาด');
                }
            } catch (err) {
                notify.error('เกิดข้อผิดพลาดในการเชื่อมต่อ');
            }
        });

        // Load Users
        async function loadUsers() {
            const tableBody = document.getElementById('userTableBody');
            const currentUser = JSON.parse(localStorage.getItem('user') || '{}');
            const isVisitor = currentUser.role === 'Visitor';

            // Hide Add User button for Visitors
            if (isVisitor) {
                const addBtnContainer = document.getElementById('addUserBtnContainer');
                if (addBtnContainer) addBtnContainer.style.display = 'none';
            }

            try {
                const response = await apiFetch('/api/users');
                const users = await response.json();
                
                if (users.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="6" class="px-6 py-10 text-center text-slate-400">ไม่พบข้อมูลผู้ใช้งาน</td></tr>';
                    return;
                }

                tableBody.innerHTML = users.map(user => {
                    const currentUser = JSON.parse(localStorage.getItem('user') || '{}');
                    const isVisitor = currentUser.role === 'Visitor';
                    
                    return `
                        <tr class="hover:bg-slate-50/50 transition-colors">
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-3">
                                    <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-[10px] font-bold text-slate-600">
                                        ${escapeHTML(user.name.charAt(0))}
                                    </div>
                                    <span class="text-sm font-semibold text-slate-700">${escapeHTML(user.name)}</span>
                                </div>
                            </td>
                            <td class="px-6 py-4 text-sm text-slate-500">${escapeHTML(user.email)}</td>
                            <td class="px-6 py-4 text-sm text-slate-600 font-medium">${escapeHTML(user.role_name || 'User')}</td>
                            <td class="px-6 py-4 text-sm text-slate-500">${escapeHTML(user.department_name || '-')}</td>
                            <td class="px-6 py-4 text-center">
                                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-[10px] font-bold bg-emerald-50 text-emerald-600 border border-emerald-100">
                                    ใช้งานปกติ
                                </span>
                            </td>
                            <td class="px-6 py-4 text-right">
                                ${isVisitor ? 
                                    `<span class="text-slate-300 cursor-not-allowed" title="Visitor ไม่สามารถแก้ไขข้อมูลได้"><i data-lucide="lock" class="w-4 h-4 ml-auto"></i></span>` :
                                    `<button onclick="openEditModal('${user.id}', '${escapeHTML(user.name)}', '${escapeHTML(user.email)}', '${user.role_id}', '${user.department_id || ''}')" class="text-slate-400 hover:text-indigo-600 transition-colors p-2 hover:bg-indigo-50 rounded-lg">
                                        <i data-lucide="edit-3" class="w-4 h-4"></i>
                                    </button>`
                                }
                            </td>
                        </tr>
                    `;
                }).join('');
                lucide.createIcons();
            } catch (error) {
                tableBody.innerHTML = '<tr><td colspan="6" class="px-6 py-10 text-center text-red-500">เกิดข้อผิดพลาดในการโหลดข้อมูล</td></tr>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadUsers);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายละเอียดทรัพย์สิน | ITSM Admin</title>
    <script>
        if (!localStorage.getItem('token')) {
            window.location.replace('/login.html');
        }
    </script>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.454.0/lucide.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body class="h-full flex overflow-hidden">
    <!-- Sidebar Container -->
    <div id="sidebar-container"></div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <!-- Header Container (Client-side rendered) -->
        <div id="header-container"></div>

        <main class="flex-1 overflow-x-hidden overflow-y-auto p-4 sm:p-10 bg-slate-50/50">
            <div class="max-w-5xl mx-auto space-y-6">
                <!-- Asset Info Card -->
                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="bg-gradient-to-r from-indigo-600 to-blue-500 p-8 text-white relative">
                        <div class="relative z-10 flex flex-col md:flex-row md:items-center justify-between gap-6">
                            <div>
                                <div class="flex items-center gap-3 mb-2">
                                    <span id="assetCategory" class="px-2 py-0.5 bg-white/20 rounded text-[10px] font-bold uppercase tracking-widest text-white">CATEGORY</span>
                                    <span id="assetStatus" class="status-badge bg-white text-indigo-600 border-none">STATUS</span>
                                </div>
                                <h1 id="assetName" class="text-3xl font-extrabold tracking-tight">Loading Asset Name...</h1>
                                <p id="assetModel" class="text-indigo-100 font-medium opacity-90 mt-1 italic">Brand / Model</p>
                            </div>
                            <div class="text-left md:text-right">
                                <p class="text-[10px] font-bold text-indigo-200 uppercase tracking-widest">หมายเลขทรัพย์สิน (Asset Tag)</p>
                                <p id="assetTag" class="text-2xl font-mono font-bold">IT-XXXXX</p>
                            </div>
                        </div>
                        <div class="absolute -right-10 -top-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
                    </div>
                    
                    <div class="p-8 grid grid-cols-1 md:grid-cols-3 gap-8">
                        <div class="space-y-6">
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Serial Number (S/N)</label>
                                <p id="serialNumber" class="text-sm font-bold text-slate-700">-</p>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">วันที่ซื้อ (Purchase Date)</label>
                                <p id="purchaseDate" class="text-sm font-bold text-slate-700">-</p>
                            </div>
                        </div>
                        <div class="space-y-6">
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">ผู้ครอบครองปัจจุบัน</label>
                                <div class="flex items-center gap-3 mt-1">
                                    <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-xs font-bold text-slate-500" id="userInitial">?</div>
                                    <p id="assignedTo" class="text-sm font-bold text-slate-700">ไม่มีผู้ครอบครอง</p>
                                </div>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">สังกัดแผนก / สาขา</label>
                                <p id="deptBranch" class="text-sm font-bold text-slate-700">-</p>
                            </div>
                        </div>
                        <div class="flex items-end justify-end">
                             <button onclick="editCurrentAsset()" class="btn-primary w-full md:w-auto mt-4">
                                <i data-lucide="edit-3" class="w-4 h-4"></i> แก้ไขข้อมูล
                            </button>
                        </div>
                    </div>
                </div>

                <!-- History Section -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Repair History -->
                    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-8">
                         <div class="flex items-center justify-between mb-6">
                            <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                                <i data-lucide="wrench" class="w-5 h-5 text-indigo-500"></i> ประวัติการซ่อมบำรุง
                            </h2>
                            <span id="ticketCount" class="text-[10px] bg-slate-100 text-slate-500 px-2 py-1 rounded-full font-bold">0 เคส</span>
                        </div>
                        <div id="ticketHistory" class="space-y-4">
                            <!-- Tickets loaded here -->
                            <p class="text-center py-10 text-slate-400 text-sm italic">ไม่มีประวัติการแจ้งซ่อม</p>
                        </div>
                    </div>

                    <!-- Usage History / Logs -->
                    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-8">
                         <div class="flex items-center justify-between mb-6">
                            <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                                <i data-lucide="history" class="w-5 h-5 text-indigo-500"></i> ประวัติการเปลี่ยนแปลง
                            </h2>
                        </div>
                        <div id="logHistory" class="space-y-4">
                            <!-- Logs loaded here -->
                            <p class="text-center py-10 text-slate-400 text-sm italic">ไม่มีบันทึกการเปลี่ยนแปลง</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/assets/js/app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const assetId = urlParams.get('id');

        if (!assetId) {
            window.location.replace('/assets.html');
        }

        async function loadAssetDetail() {
            try {
                const response = await apiFetch(`/api/assets?action=getDetail&id=${assetId}`);
                if (!response.ok) throw new Error('Failed to load asset');
                const { asset, tickets } = await response.json();

                // Render Info
                document.getElementById('assetName').innerText = asset.name;
                document.getElementById('assetTag').innerText = asset.asset_tag;
                document.getElementById('assetModel').innerText = asset.model || 'ไม่ทราบแบรนด์/รุ่น';
                document.getElementById('assetCategory').innerText = asset.category || 'อื่นๆ';
                document.getElementById('serialNumber').innerText = asset.serial_number || '-';
                document.getElementById('purchaseDate').innerText = asset.purchase_date ? new Date(asset.purchase_date).toLocaleDateString('th-TH') : '-';
                
                const statusEl = document.getElementById('assetStatus');
                statusEl.innerText = asset.status;
                statusEl.className = ui.getBadgeClass('status', asset.status);

                document.getElementById('assignedTo').innerText = asset.assigned_to_name || 'ไม่มีผู้ครอบครอง';
                document.getElementById('userInitial').innerText = (asset.assigned_to_name || '?').charAt(0);
                document.getElementById('deptBranch').innerText = `${asset.department_name || '-'} / ${asset.branch_name || '-'}`;

                // Render Tickets
                const ticketList = document.getElementById('ticketHistory');
                document.getElementById('ticketCount').innerText = `${tickets.length} เคส`;
                if (tickets.length > 0) {
                    ticketList.innerHTML = tickets.map(t => `
                        <div class="p-4 bg-white rounded-2xl border border-slate-100 hover:border-indigo-200 transition-all cursor-pointer shadow-sm hover:shadow-md" onclick="window.location.href='/ticket-detail.html?id=${t.id}'">
                            <div class="flex justify-between items-start mb-2">
                                <h4 class="text-sm font-bold text-slate-800 truncate">${escapeHTML(t.subject)}</h4>
                                <span class="${ui.getBadgeClass('status', t.status)}">${t.status}</span>
                            </div>
                            <div class="flex justify-between items-center text-[10px] text-slate-400 font-bold uppercase tracking-wider">
                                <span>${new Date(t.created_at).toLocaleDateString('th-TH')}</span>
                                <span class="text-indigo-600">โดย ${escapeHTML(t.reporter_name)}</span>
                            </div>
                        </div>
                    `).join('');
                }

                // Load Logs
                loadAssetLogs();
            } catch (error) {
                console.error(error);
                notify.error('ไม่สามารถโหลดข้อมูลได้');
            }
        }

        async function loadAssetLogs() {
             try {
                // Optimized: Filter by target_id at database level
                const response = await apiFetch(`/api/logs?module=Assets&target_id=${assetId}&limit=10`, { silent: true });
                if (!response.ok) return;
                const logs = await response.json();
                
                const logBody = document.getElementById('logHistory');
                if (logs.length > 0) {
                    logBody.innerHTML = logs.map(l => `
                        <div class="flex gap-3 relative pb-4 border-l-2 border-slate-100 ml-2 pl-4 last:pb-0">
                            <div class="absolute -left-[9px] top-0 w-4 h-4 rounded-full bg-white border-2 ${l.action === 'Delete' ? 'border-red-400' : 'border-indigo-400'}"></div>
                            <div>
                                <p class="text-xs font-bold text-slate-700 leading-tight">${l.action} ${l.module}</p>
                                <p class="text-[10px] text-slate-400 mt-1">โดย ${escapeHTML(l.user_name || 'System')} • ${new Date(l.created_at).toLocaleString('th-TH')}</p>
                            </div>
                        </div>
                    `).join('');
                } else {
                    logBody.innerHTML = '<p class="text-xs text-slate-400 italic py-2">ไม่มีประวัติกิจกรรม</p>';
                }
            } catch (err) {}
        }

        function editCurrentAsset() {
            // Redirect to assets page with edit trigger or just handle here
             notify.info('ฟีเจอร์นี้เตรียมเปิดใช้งานเร็วๆ นี้');
        }

        document.addEventListener('DOMContentLoaded', () => {
            ui.renderHeader('รายละเอียดทรัพย์สิน', true);
            loadAssetDetail();
        });
    </script>
</body>
</html>
